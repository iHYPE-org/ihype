<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · iHYPE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ihype-shared.css">
<style>
/* ── Layout ─────────────────────────────────────────────────── */
.dash-layout{display:grid;grid-template-columns:1fr 280px;gap:1.5rem;align-items:start}

/* ── Greeting ────────────────────────────────────────────────── */
.greeting{margin-bottom:1.5rem}
.greeting-time{font-family:var(--f-m);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-4);font-weight:600;margin-bottom:.35rem}
.greeting-name{font-family:var(--f-d);font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-.03em;color:var(--ink);line-height:1.1;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.role-badge{font-family:var(--f-m);font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;font-weight:600;padding:.25rem .65rem;border-radius:99px;border:1px solid;flex-shrink:0;align-self:center}
.role-badge.fan{color:var(--r-fan);border-color:rgba(185,131,255,.3);background:rgba(185,131,255,.08)}
.role-badge.artist{color:var(--r-artist);border-color:rgba(255,80,41,.3);background:rgba(255,80,41,.08)}
.role-badge.venue{color:var(--r-venue);border-color:rgba(34,229,212,.3);background:rgba(34,229,212,.08)}
.role-badge.promoter{color:var(--r-promoter);border-color:rgba(255,62,154,.3);background:rgba(255,62,154,.08)}

/* ── Stats grid ──────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:1.5rem}
.stat-card{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-lg);padding:1.3rem 1.4rem}
.stat-card .lbl{font-family:var(--f-m);font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:.5rem}
.stat-card .val{font-family:var(--f-d);font-size:2rem;font-weight:700;line-height:1;letter-spacing:-.025em;color:var(--ink)}
.stat-card .sub{font-family:var(--f-m);font-size:.72rem;color:var(--ink-3);margin-top:.3rem}
.stat-card.accent .val{color:var(--accent)}
.stat-card.teal .val{color:var(--r-venue)}
.stat-card.purple .val{color:var(--r-fan)}
.stat-card.pink .val{color:var(--r-promoter)}

/* ── Shows list ──────────────────────────────────────────────── */
.shows-section{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
.shows-section-head{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.4rem;border-bottom:1px solid var(--line)}
.shows-section-head h3{font-family:var(--f-d);font-size:1rem;font-weight:700}
.shows-section-head a{font-family:var(--f-m);font-size:.76rem;color:var(--accent-ink);text-decoration:none;font-weight:500}
.shows-section-head a:hover{text-decoration:underline}
.show-row{display:grid;grid-template-columns:1fr auto;gap:1rem;padding:.85rem 1.4rem;border-bottom:1px solid var(--line);align-items:center}
.show-row:last-child{border-bottom:none}
.show-title{font-family:var(--f-d);font-size:.92rem;font-weight:600;color:var(--ink);margin-bottom:.2rem}
.show-meta{font-family:var(--f-m);font-size:.72rem;color:var(--ink-3)}
.show-badges{display:flex;gap:.3rem;flex-wrap:wrap}
.badge{font-family:var(--f-m);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:.18rem .5rem;border-radius:99px;border:1px solid}
.badge.live{color:var(--accent);border-color:rgba(255,80,41,.3);background:rgba(255,80,41,.08)}
.badge.draft{color:var(--ink-3);border-color:var(--line-2);background:transparent}
.badge.scheduled{color:var(--r-venue);border-color:rgba(34,229,212,.3);background:rgba(34,229,212,.06)}
.badge.radio{color:var(--r-fan);border-color:rgba(185,131,255,.3);background:rgba(185,131,255,.06)}
.shows-empty{padding:2.5rem 1.4rem;text-align:center;color:var(--ink-3);font-family:var(--f-m);font-size:.84rem;display:flex;flex-direction:column;gap:.75rem;align-items:center}
.shows-empty a{color:var(--accent-ink);font-weight:500;text-decoration:none}
.shows-empty a:hover{text-decoration:underline}

/* ── Geo bars ────────────────────────────────────────────────── */
.geo-section{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-lg);padding:1.2rem 1.4rem;margin-bottom:1.5rem}
.geo-section h3{font-family:var(--f-d);font-size:.92rem;font-weight:700;margin-bottom:1rem;color:var(--ink)}
.geo-row{display:grid;grid-template-columns:100px 1fr 36px;gap:.65rem;align-items:center;margin-bottom:.55rem;font-size:.78rem}
.geo-row:last-child{margin-bottom:0}
.geo-label{font-family:var(--f-m);color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.geo-track{height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.geo-fill{height:100%;background:var(--r-venue);border-radius:3px;transition:width .5s ease}
.geo-count{font-family:var(--f-m);color:var(--ink-3);text-align:right}

/* ── Right panel — Engines ───────────────────────────────────── */
.engines-panel{display:flex;flex-direction:column;gap:.6rem}
.engines-head{font-family:var(--f-m);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-4);font-weight:600;margin-bottom:.2rem}
.engine-card{display:flex;align-items:flex-start;gap:.85rem;padding:1rem 1.1rem;background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-md);text-decoration:none;transition:border-color .15s,transform .12s;cursor:pointer}
.engine-card:hover{border-color:var(--line-3);transform:translateX(2px)}
.engine-icon{font-size:1.1rem;flex-shrink:0;margin-top:.05rem}
.engine-text{}
.engine-name{font-family:var(--f-d);font-size:.9rem;font-weight:700;color:var(--ink);margin-bottom:.15rem}
.engine-desc{font-family:var(--f-m);font-size:.72rem;color:var(--ink-3);line-height:1.45}

/* ── Skeleton ────────────────────────────────────────────────── */
.skel{border-radius:var(--r-md)}

@media(max-width:860px){
  .dash-layout{grid-template-columns:1fr}
  .engines-panel{flex-direction:row;flex-wrap:wrap}
  .engine-card{flex:1;min-width:200px}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="bg-canvas" aria-hidden="true">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
</div>
<div class="site-shell">

<nav class="nav">
  <div class="nav-left">
    <a href="/" style="text-decoration:none;color:inherit">
      <div class="brand">i<em>HYPE</em></div>
    </a>
    <span class="beta-pill" style="font-family:var(--f-m);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;padding:.2rem .5rem;border-radius:99px;background:rgba(255,80,41,.1);border:1px solid rgba(255,80,41,.22);color:var(--accent)">Beta</span>
  </div>
  <div class="nav-right">
    <button class="role-pill fan"><span class="av">·</span><span class="name">…</span><span class="ctx">▾</span></button>
  </div>
</nav>

<div class="page">
  <div id="dash-root">
    <!-- Skeleton while loading -->
    <div id="dash-skeleton">
      <div style="height:2.4rem;width:220px;margin-bottom:1.5rem" class="skeleton skel"></div>
      <div class="stats-grid">
        <div class="skeleton skel" style="height:100px"></div>
        <div class="skeleton skel" style="height:100px"></div>
        <div class="skeleton skel" style="height:100px"></div>
        <div class="skeleton skel" style="height:100px"></div>
      </div>
    </div>
    <div id="dash-content" style="display:none"></div>
  </div>
</div>

</div><!-- /site-shell -->
<script src="/ihype-user-menu.js" defer></script>
<script>
(function(){
  function esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmt(n){ if(n==null) return '—'; if(n>=1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'')+'M'; if(n>=1000) return (n/1000).toFixed(1).replace(/\.0$/,'')+'k'; return String(n); }
  function fmtDollars(cents){ if(!cents) return '$0'; return '$'+(cents/100).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }
  function fmtDate(iso){ try{ return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }catch(e){ return ''; } }

  function greeting(){
    const h = new Date().getHours();
    if(h < 12) return 'Good morning';
    if(h < 17) return 'Good afternoon';
    return 'Good evening';
  }

  function roleClass(role){
    const r = (role||'').toUpperCase();
    if(r==='ARTIST') return 'artist';
    if(r==='VENUE') return 'venue';
    if(r==='DJ') return 'promoter';
    return 'fan';
  }
  function roleLabel(role){
    const r = (role||'').toUpperCase();
    if(r==='ARTIST') return 'Artist';
    if(r==='VENUE') return 'Venue';
    if(r==='DJ') return 'Promoter';
    return 'Fan';
  }

  function statCard(lbl, val, sub, colorClass){
    return '<div class="stat-card'+(colorClass?' '+colorClass:'')+'">'+
      '<div class="lbl">'+esc(lbl)+'</div>'+
      '<div class="val">'+esc(String(val))+'</div>'+
      (sub?'<div class="sub">'+esc(sub)+'</div>':'')+
    '</div>';
  }

  function buildStats(data){
    const role = (data.role||'').toUpperCase();
    const isCreator = ['ARTIST','DJ','VENUE'].includes(role);
    let cards = '';

    if(isCreator){
      cards += statCard('HYPE received', fmt(data.hype?.received), 'across all your shows + profile', 'accent');
      cards += statCard('Shows created', fmt(data.showStats?.total), (data.showStats?.live||0)+' live · '+(data.showStats?.draft||0)+' draft', 'teal');
      cards += statCard('Tickets sold', fmt(data.showStats?.ticketsSold), 'confirmed orders', '');
      cards += statCard('Earnings released', fmtDollars(data.earningsStats?.releasedCents), 'paid to your account', 'purple');
    } else {
      cards += statCard('HYPE given', fmt(data.hype?.given), 'to shows and artists', 'accent');
      cards += statCard('Songs played', fmt(data.plays?.songs), 'total listens', '');
      cards += statCard('Shows watched', fmt(data.plays?.shows), 'streams completed', 'teal');
      cards += statCard('Tickets bought', fmt(data.fanStats?.ticketsBought), 'confirmed orders', 'purple');
    }
    return '<div class="stats-grid">'+cards+'</div>';
  }

  function buildGeo(geoStats){
    if(!geoStats||!geoStats.length) return '';
    const top = geoStats.slice(0,6);
    const max = top[0].count || 1;
    const rows = top.map(g=>{
      const pct = Math.round(g.count/max*100);
      const label = [g.region, g.country].filter(Boolean).join(', ') || 'Unknown';
      return '<div class="geo-row">'+
        '<div class="geo-label" title="'+esc(label)+'">'+esc(label)+'</div>'+
        '<div class="geo-track"><div class="geo-fill" style="width:'+pct+'%"></div></div>'+
        '<div class="geo-count">'+g.count+'</div>'+
      '</div>';
    }).join('');
    return '<div class="geo-section"><h3>Audience by region</h3>'+rows+'</div>';
  }

  function buildShows(shows, role){
    const isCreator = ['ARTIST','DJ','VENUE'].includes((role||'').toUpperCase());
    if(!isCreator) return '';
    const section = '<div class="shows-section">';
    const head = '<div class="shows-section-head"><h3>Your shows</h3><a href="/show-creator">+ Create a show</a></div>';
    if(!shows||!shows.length){
      return section+head+'<div class="shows-empty"><div>No shows yet.</div><a href="/show-creator">Create your first show →</a></div></div>';
    }
    const rows = shows.slice(0,10).map(s=>{
      const badges = [];
      if(s.status==='LIVE') badges.push('<span class="badge live">Live</span>');
      else if(s.status==='SCHEDULED') badges.push('<span class="badge scheduled">Scheduled</span>');
      else if(s.status==='DRAFT') badges.push('<span class="badge draft">Draft</span>');
      else if(s.status==='ENDED') badges.push('<span class="badge draft">Ended</span>');
      if(s.isRadioShow) badges.push('<span class="badge radio">Radio</span>');
      else if(s.isTicketed) badges.push('<span class="badge scheduled">Ticketed</span>');

      const metaParts = [];
      if(s.isRadioShow){
        const trackCount = (s.productionPlan?.tracks?.length||0);
        metaParts.push(trackCount+' track'+(trackCount!==1?'s':''));
      } else {
        if(s.startsAt) metaParts.push(fmtDate(s.startsAt));
        const venue = s.venueProfile?.name;
        const headliner = s.headlinerProfile?.name;
        if(headliner) metaParts.push(headliner);
        if(venue) metaParts.push(venue);
      }
      if(s.isTicketed && s.ticketsSoldCount!=null){
        metaParts.push(fmt(s.ticketsSoldCount)+' tickets sold');
      }

      const href = (s.status!=='DRAFT') ? '/tickets' : '/show-creator';
      return '<div class="show-row">'+
        '<div>'+
          '<div class="show-title"><a href="'+href+'" style="color:inherit;text-decoration:none">'+esc(s.title)+'</a></div>'+
          (metaParts.length?'<div class="show-meta">'+esc(metaParts.join(' · '))+'</div>':'')+
        '</div>'+
        '<div class="show-badges">'+badges.join('')+'</div>'+
      '</div>';
    }).join('');
    const more = shows.length>10
      ? '<div class="show-row" style="justify-content:center"><a href="/show-creator" style="font-family:var(--f-m);font-size:.8rem;color:var(--accent-ink);text-decoration:none">View all '+shows.length+' shows →</a></div>'
      : '';
    return section+head+rows+more+'</div>';
  }

  function buildEngines(role){
    const r = (role||'').toUpperCase();
    const isCreator = ['ARTIST','DJ','VENUE'].includes(r);
    const engines = [
      {icon:'📡', name:'Recommendation Engine', desc:'Discover music, artists, and shows ranked by your taste and location', href:'/discover', all:true},
      {icon:'🎟️', name:'Ticketing Engine', desc:'Browse upcoming shows and manage your tickets', href:'/tickets', all:true},
      {icon:'🎙️', name:'Show Creation Engine', desc:'Create a live event or curated radio show', href:'/show-creator', creatorOnly:true},
      {icon:'🎨', name:'Customization Engine', desc:'Edit your artist, venue, or promoter profile page', href:'/customizer', creatorOnly:true},
    ];
    const items = engines
      .filter(e => e.all || (e.creatorOnly && isCreator))
      .map(e=>'<a class="engine-card" href="'+e.href+'"><div class="engine-icon">'+e.icon+'</div><div class="engine-text"><div class="engine-name">'+esc(e.name)+'</div><div class="engine-desc">'+esc(e.desc)+'</div></div></a>')
      .join('');
    return '<div class="engines-panel"><div class="engines-head">Engines</div>'+items+'</div>';
  }

  function buildDash(session, stats, shows){
    const role = stats.role || 'FAN';
    const name = session.name || session.email?.split('@')[0] || 'there';
    const rc = roleClass(role);
    const rl = roleLabel(role);
    const isCreator = ['ARTIST','DJ','VENUE'].includes(role.toUpperCase());

    const header = '<div class="greeting">'+
      '<div class="greeting-time">'+esc(greeting())+'</div>'+
      '<div class="greeting-name">'+esc(name)+' <span class="role-badge '+rc+'">'+esc(rl)+'</span></div>'+
    '</div>';

    const left = '<div>'+
      buildStats(stats)+
      (isCreator ? buildGeo(stats.geoStats) : '')+
      buildShows(shows, role)+
    '</div>';

    const right = buildEngines(role);

    return header+'<div class="dash-layout">'+left+right+'</div>';
  }

  // Show a success banner if redirected from show creator
  (function(){
    const p = new URLSearchParams(window.location.search);
    if(p.get('show_created')==='1'){
      const banner = document.createElement('div');
      banner.style.cssText='background:rgba(34,229,212,.1);border:1px solid rgba(34,229,212,.3);border-radius:var(--r-md);padding:.85rem 1.2rem;font-family:var(--f-m);font-size:.86rem;color:var(--r-venue);margin-bottom:1.2rem;display:flex;align-items:center;gap:.75rem';
      banner.innerHTML='<span style="font-size:1.1rem">✓</span> Show created! It\'s now in your shows list below. <a href="/show-creator" style="color:inherit;font-weight:600;margin-left:auto">Create another →</a>';
      document.querySelector('.page').prepend(banner);
      history.replaceState({}, '', '/home');
    }
  })();

  async function load(){
    try{
      const sessionRes = await fetch('/api/auth/session',{credentials:'same-origin'});
      if(!sessionRes.ok){ window.location.href='/login'; return; }
      const session = await sessionRes.json();
      if(!session||!session.user){ window.location.href='/login'; return; }

      const [statsRes, showsRes] = await Promise.all([
        fetch('/api/stats/me',{credentials:'same-origin'}),
        fetch('/api/shows?mine=1',{credentials:'same-origin'})
      ]);

      const stats = statsRes.ok ? await statsRes.json() : {role:session.user.role||'FAN'};
      const shows = showsRes.ok ? await showsRes.json() : [];

      document.getElementById('dash-skeleton').style.display = 'none';
      const content = document.getElementById('dash-content');
      content.innerHTML = buildDash(session.user, stats, shows);
      content.style.display = '';
    } catch(e){
      window.location.href = '/login';
    }
  }

  load();
})();
</script>
</body>
</html>
