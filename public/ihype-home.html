<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home · iHYPE.org</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ihype-shared.css">
<style>
.home-grid{display:grid;grid-template-columns:1fr 320px;gap:1.2rem;align-items:start}
@media(max-width:860px){.home-grid{grid-template-columns:1fr}}

/* Greeting */
.greeting-card{padding:1.8rem 2rem;background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--r-lg);display:flex;align-items:center;gap:1.4rem;margin-bottom:1.2rem}
.greeting-av{width:52px;height:52px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--f-d);font-size:1.3rem;font-weight:700;flex-shrink:0}
.greeting-av.fan{background:var(--r-fan)}
.greeting-av.artist{background:var(--r-artist)}
.greeting-av.venue{background:var(--r-venue)}
.greeting-av.promoter{background:var(--r-promoter)}
.greeting-name{font-family:var(--f-d);font-size:1.4rem;font-weight:700;line-height:1.15}
.greeting-sub{font-size:.88rem;color:var(--ink-2);margin-top:.3rem}
.greeting-role{font-family:var(--f-m);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;font-weight:600;padding:.2rem .6rem;border-radius:99px;color:#fff;margin-left:.6rem;vertical-align:middle}
.greeting-role.fan{background:var(--r-fan)}
.greeting-role.artist{background:var(--r-artist)}
.greeting-role.venue{background:var(--r-venue)}
.greeting-role.promoter{background:var(--r-promoter)}

/* Quick actions */
.quick-actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.4rem}
.qa-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.55rem 1.1rem;border-radius:var(--r-md);font-size:.86rem;font-weight:500;border:1px solid var(--line-2);background:var(--bg-2);color:var(--ink);text-decoration:none;transition:all .15s}
.qa-btn:hover{border-color:var(--line-3);transform:translateY(-1px)}
.qa-btn.primary{background:var(--ink);color:var(--bg);border-color:transparent}
.qa-btn.primary:hover{background:var(--accent);border-color:transparent}
.qa-icon{font-size:1rem;line-height:1}

/* Section title */
.home-section-title{font-family:var(--f-d);font-size:1rem;font-weight:600;margin-bottom:.85rem;display:flex;align-items:center;justify-content:space-between}
.home-section-title a{font-family:var(--f-m);font-size:.74rem;color:var(--ink-3);font-weight:400;text-decoration:none}
.home-section-title a:hover{color:var(--ink)}

/* Show cards */
.shows-list{display:flex;flex-direction:column;gap:.6rem}
.show-card{display:grid;grid-template-columns:auto 1fr auto;gap:1rem;padding:1rem 1.1rem;background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-md);align-items:center;transition:all .15s;text-decoration:none;color:inherit}
.show-card:hover{border-color:var(--line-3);transform:translateX(2px)}
.show-date-block{text-align:center;width:44px;flex-shrink:0}
.show-date-block .day{font-family:var(--f-d);font-size:1.5rem;font-weight:700;line-height:1;color:var(--accent)}
.show-date-block .mon{font-family:var(--f-m);font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);margin-top:.1rem}
.show-info .name{font-family:var(--f-d);font-size:.98rem;font-weight:600;margin-bottom:.2rem}
.show-info .meta{font-size:.78rem;color:var(--ink-2)}
.show-badge{font-family:var(--f-m);font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;padding:.25rem .6rem;border-radius:99px;border:1px solid var(--line-2);color:var(--ink-3);font-weight:500;white-space:nowrap}
.show-badge.live{color:#4ade80;border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.06)}
.show-badge.ticketed{color:var(--accent);border-color:rgba(216,58,22,.25)}

/* Stat cards (sidebar) */
.stat-card{padding:1.3rem 1.4rem;background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--r-lg);margin-bottom:.8rem}
.stat-card-title{font-family:var(--f-m);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:.7rem}
.stat-num{font-family:var(--f-d);font-size:2rem;font-weight:700;line-height:1;color:var(--accent)}
.stat-lbl{font-size:.8rem;color:var(--ink-2);margin-top:.3rem}
.stat-rows{display:flex;flex-direction:column;gap:.5rem}
.stat-row{display:flex;justify-content:space-between;font-size:.84rem;padding:.45rem 0;border-bottom:1px solid var(--line)}
.stat-row:last-child{border-bottom:none}
.stat-row .k{color:var(--ink-2)}
.stat-row .v{font-weight:500;color:var(--ink)}

/* Links card */
.links-card{padding:1.1rem 1.3rem;background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--r-lg)}
.links-card-title{font-family:var(--f-m);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:.6rem}
.nav-link-item{display:flex;align-items:center;gap:.65rem;padding:.55rem .4rem;border-radius:var(--r-sm);font-size:.88rem;color:var(--ink);text-decoration:none;transition:background .12s}
.nav-link-item:hover{background:var(--surface-2)}
.nav-link-item .ico{font-size:1rem;width:22px;text-align:center}

/* Empty / loading states */
.skeleton{background:var(--line);border-radius:var(--r-sm);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:.3}}
.empty-state{padding:2rem;text-align:center;color:var(--ink-3);font-size:.88rem;border:1.5px dashed var(--line-2);border-radius:var(--r-lg)}
</style>
</head>
<body>
<div class="site-shell">

<nav class="nav">
  <div class="nav-left">
    <a href="/" style="text-decoration:none;color:inherit"><div class="brand">i<em>HYPE</em></div></a>
    <div class="nav-links">
      <a href="/home" class="nav-link active">Home</a>
      <a href="/discover" class="nav-link">Discover</a>
      <a href="/hype" class="nav-link">HYPE</a>
      <a href="/tickets" class="nav-link">Shows</a>
      <a href="/promise" class="nav-link">The Promise</a>
    </div>
  </div>
  <div class="nav-right">
    <button class="a11y-btn" id="openA11y"><span aria-hidden="true">⊙</span><span>Accessibility</span></button>
    <button class="role-pill fan"><span class="av">·</span><span class="name">…</span><span class="ctx">▾</span></button>
  </div>
</nav>

<div class="page">

  <!-- GREETING -->
  <div class="greeting-card" id="greeting-card">
    <div class="greeting-av fan" id="greeting-av">·</div>
    <div>
      <div class="greeting-name" id="greeting-name">
        <span class="skeleton" style="display:inline-block;width:180px;height:1.4rem;border-radius:4px"></span>
      </div>
      <div class="greeting-sub" id="greeting-sub">Loading your dashboard…</div>
    </div>
  </div>

  <!-- QUICK ACTIONS -->
  <div class="quick-actions" id="quick-actions" style="display:none"></div>

  <!-- MAIN CONTENT -->
  <div class="home-grid">
    <div>
      <!-- SHOWS SECTION -->
      <div class="home-section-title">
        <span id="shows-section-title">Upcoming shows</span>
        <a href="/tickets">View all →</a>
      </div>
      <div id="shows-list" class="shows-list">
        <div class="skeleton" style="height:72px;border-radius:var(--r-md)"></div>
        <div class="skeleton" style="height:72px;border-radius:var(--r-md);opacity:.7"></div>
        <div class="skeleton" style="height:72px;border-radius:var(--r-md);opacity:.4"></div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="stat-card">
        <div class="stat-card-title">Quick navigation</div>
        <div id="sidebar-links"></div>
      </div>
    </div>
  </div>

</div>
</div><!-- /site-shell -->

<script src="/ihype-user-menu.js" defer></script>
<script>
(function(){

  function roleClass(role){
    const r = String(role||'').toUpperCase();
    if(r==='ARTIST') return 'artist';
    if(r==='VENUE') return 'venue';
    if(r==='DJ'||r==='PROMOTER') return 'promoter';
    return 'fan';
  }
  function roleLabel(role){
    const r = String(role||'').toUpperCase();
    if(r==='ARTIST') return 'Artist';
    if(r==='VENUE') return 'Venue';
    if(r==='DJ') return 'Promoter';
    if(r==='ADMIN') return 'Admin';
    return 'Fan';
  }
  function initial(name,email){
    return ((name&&name.trim())||(email&&email.trim())||'?').charAt(0).toUpperCase();
  }
  function greet(){
    const h = new Date().getHours();
    if(h<12) return 'Good morning';
    if(h<17) return 'Good afternoon';
    return 'Good evening';
  }
  function fmtDate(iso){
    if(!iso) return null;
    const d = new Date(iso);
    return {
      day: d.getDate(),
      mon: d.toLocaleString('default',{month:'short'}),
      full: d.toLocaleString(undefined,{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})
    };
  }
  function escHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function renderGreeting(user){
    const cls = roleClass(user.role);
    const display = user.name||(user.email?user.email.split('@')[0]:'there');
    document.getElementById('greeting-av').className = 'greeting-av ' + cls;
    document.getElementById('greeting-av').textContent = initial(user.name, user.email);
    document.getElementById('greeting-name').innerHTML =
      greet() + ', <strong>' + escHtml(display) + '</strong>' +
      '<span class="greeting-role ' + cls + '">' + roleLabel(user.role) + '</span>';
    document.getElementById('greeting-sub').textContent = 'Here\'s what\'s happening on iHYPE.';
  }

  function renderQuickActions(role){
    const r = String(role||'').toUpperCase();
    const qa = document.getElementById('quick-actions');
    const actions = [];

    if(r==='ARTIST'||r==='DJ'||r==='VENUE'){
      actions.push({href:'/show-creator',label:'Create a show',icon:'＋',primary:true});
    }
    actions.push({href:'/discover',label:'Discover',icon:'◎'});
    actions.push({href:'/hype',label:'HYPE engine',icon:'★'});
    if(r==='ARTIST'||r==='DJ'||r==='VENUE'){
      actions.push({href:'/tickets',label:'My shows',icon:'🎟'});
    } else {
      actions.push({href:'/tickets',label:'Browse shows',icon:'🎟'});
    }
    actions.push({href:'/customizer',label:'Customize page',icon:'✦'});

    qa.innerHTML = actions.map(a=>
      '<a href="'+a.href+'" class="qa-btn'+(a.primary?' primary':'')+'"><span class="qa-icon">'+a.icon+'</span>'+escHtml(a.label)+'</a>'
    ).join('');
    qa.style.display = 'flex';
  }

  function renderSidebarLinks(role){
    const r = String(role||'').toUpperCase();
    const links = [
      {href:'/discover',ico:'◎',label:'Discover artists'},
      {href:'/hype',ico:'★',label:'HYPE engine'},
      {href:'/tickets',ico:'🎟',label:'Upcoming shows'},
      {href:'/promise',ico:'◈',label:'The Promise'},
    ];
    if(r==='ARTIST'||r==='DJ'||r==='VENUE'){
      links.unshift({href:'/show-creator',ico:'＋',label:'Create a show'});
    }
    links.push({href:'/customizer',ico:'✦',label:'Customize my page'});

    document.getElementById('sidebar-links').innerHTML = links.map(l=>
      '<a href="'+l.href+'" class="nav-link-item"><span class="ico">'+l.ico+'</span>'+escHtml(l.label)+'</a>'
    ).join('');
  }

  function renderShows(shows, role){
    const r = String(role||'').toUpperCase();
    const el = document.getElementById('shows-list');
    const titleEl = document.getElementById('shows-section-title');

    // For creators: their own shows. For fans: any upcoming shows.
    let display = shows.slice(0,8);

    if(!display.length){
      el.innerHTML = '<div class="empty-state">No upcoming shows found.<br>'+
        (r==='ARTIST'||r==='DJ'||r==='VENUE'
          ? '<a href="/show-creator" style="color:var(--accent);text-decoration:none;font-weight:500">Create your first show →</a>'
          : '<a href="/discover" style="color:var(--accent);text-decoration:none;font-weight:500">Explore artists →</a>'
        )+'</div>';
      return;
    }

    if(r==='ARTIST'||r==='DJ'||r==='VENUE'){
      titleEl.textContent = 'Your shows';
    }

    el.innerHTML = display.map(show=>{
      const d = fmtDate(show.startsAt);
      const isLive = show.status === 'LIVE';
      const venue = show.venueProfile ? escHtml(show.venueProfile.name||'') : '';
      const headliner = show.headlinerProfile ? escHtml(show.headlinerProfile.name||'') : '';
      const meta = [headliner, venue].filter(Boolean).join(' · ') || escHtml(show.description||'No details');
      return (
        '<a class="show-card" href="/shows/'+escHtml(show.slug)+'">' +
          '<div class="show-date-block">' +
            '<div class="day">'+(d?d.day:'?')+'</div>' +
            '<div class="mon">'+(d?d.mon:'')+'</div>' +
          '</div>' +
          '<div class="show-info">' +
            '<div class="name">'+escHtml(show.title)+'</div>' +
            '<div class="meta">'+meta+(d?' · '+d.full:'')+'</div>' +
          '</div>' +
          '<span class="show-badge'+(isLive?' live':show.isTicketed?' ticketed':'')+'">'+
            (isLive?'Live now':show.isTicketed?'Ticketed':'Free')+
          '</span>' +
        '</a>'
      );
    }).join('');
  }

  async function init(){
    // Require session — redirect if not logged in
    let user;
    try{
      const res = await fetch('/api/auth/session',{credentials:'same-origin'});
      const data = await res.json();
      if(!data||!data.user){ window.location.href='/login'; return; }
      user = data.user;
    }catch(e){ window.location.href='/login'; return; }

    renderGreeting(user);
    renderQuickActions(user.role);
    renderSidebarLinks(user.role);

    // Fetch shows
    try{
      const res = await fetch('/api/shows',{credentials:'same-origin'});
      const shows = await res.json();
      renderShows(Array.isArray(shows)?shows:[], user.role);
    }catch(e){
      document.getElementById('shows-list').innerHTML =
        '<div class="empty-state">Could not load shows.</div>';
    }
  }

  init();
})();
</script>
</body>
</html>
