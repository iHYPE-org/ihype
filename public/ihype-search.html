<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search · iHYPE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ihype-shared.css">
<style>
/* ── Search bar ─────────────────────────────────────────────── */
.search-hero{padding:2.4rem 0 1.6rem}
.search-hero h1{font-family:var(--f-d);font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:1.2rem}
.search-hero h1 em{font-style:normal;background:var(--accent-g);-webkit-background-clip:text;background-clip:text;color:transparent}

.search-bar{display:flex;align-items:center;gap:.75rem;background:var(--bg-2);border:1.5px solid var(--line-2);border-radius:var(--r-lg);padding:.8rem 1.1rem;transition:border-color .15s;margin-bottom:.85rem}
.search-bar:focus-within{border-color:var(--accent)}
.search-icon{font-size:1.2rem;color:var(--ink-3);flex-shrink:0}
.search-input{flex:1;border:none;background:none;outline:none;font:inherit;font-size:1.05rem;color:var(--ink)}
.search-input::placeholder{color:var(--ink-3)}
.search-clear{background:none;border:none;color:var(--ink-3);cursor:pointer;font-size:1.1rem;padding:.2rem .4rem;border-radius:var(--r-sm);transition:color .14s;display:none}
.search-clear:hover{color:var(--ink)}

.type-filters{display:flex;gap:.4rem;flex-wrap:wrap}
.type-filter{padding:.32rem .8rem;border-radius:99px;font-size:.8rem;font-weight:500;font-family:var(--f-d);background:var(--bg-2);border:1px solid var(--line-2);color:var(--ink-2);cursor:pointer;transition:all .14s}
.type-filter.active{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.type-filter:hover:not(.active){border-color:var(--ink-3);color:var(--ink)}

/* ── Layout ─────────────────────────────────────────────────── */
.search-layout{display:grid;grid-template-columns:1fr 240px;gap:1.5rem;align-items:start}

/* ── Results ────────────────────────────────────────────────── */
.results-header{display:flex;align-items:baseline;gap:.85rem;margin-bottom:.85rem;flex-wrap:wrap}
.results-title{font-family:var(--f-d);font-size:1.1rem;font-weight:700;color:var(--ink)}
.results-meta{font-family:var(--f-m);font-size:.74rem;color:var(--ink-3)}
.results-counts{display:flex;gap:.5rem;flex-wrap:wrap;margin-left:auto}
.count-chip{font-family:var(--f-m);font-size:.68rem;font-weight:600;padding:.2rem .5rem;border-radius:99px;border:1px solid var(--line-2);color:var(--ink-3);background:var(--bg-2)}
.count-chip.has{border-color:var(--accent);color:var(--accent);background:rgba(255,80,41,.06)}

.result-list{display:flex;flex-direction:column;gap:.35rem}
.result-row{display:grid;grid-template-columns:36px 1fr auto;gap:.7rem;padding:.7rem .9rem;background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-md);align-items:center;text-decoration:none;color:inherit;transition:all .13s}
.result-row:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 4%,var(--bg-2))}
.result-thumb{width:36px;height:36px;border-radius:var(--r-sm);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.95rem}
.result-thumb.artist{background:linear-gradient(135deg,#d83a16,#e89060)}
.result-thumb.promoter{background:linear-gradient(135deg,#7a4fb5,#c08fe8)}
.result-thumb.venue{background:linear-gradient(135deg,#1f8782,#7fc4c0)}
.result-thumb.song{background:var(--bg-2);border:1px solid var(--line-2);color:var(--ink-3)}
.result-thumb.show{background:linear-gradient(135deg,#3a60d8,#90bce8)}
.result-thumb.genre{background:var(--bg-2);border:1px solid var(--accent);color:var(--accent);font-size:.72rem;font-family:var(--f-m);font-weight:700;text-align:center;line-height:1}
.result-name{font-family:var(--f-d);font-size:.92rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.result-sub{font-size:.76rem;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.1rem}
.result-badge{font-family:var(--f-m);font-size:.63rem;letter-spacing:.04em;padding:.18rem .48rem;border-radius:99px;border:1px solid;flex-shrink:0;font-weight:500;text-transform:uppercase;white-space:nowrap}
.result-badge.artist{color:var(--r-artist);border-color:rgba(216,58,22,.3)}
.result-badge.promoter{color:var(--r-promoter);border-color:rgba(122,79,181,.3)}
.result-badge.venue{color:var(--r-venue);border-color:rgba(31,135,130,.3)}
.result-badge.song{color:var(--ink-2);border-color:var(--line-2)}
.result-badge.show{color:#90bce8;border-color:rgba(58,96,216,.3)}
.result-badge.genre{color:var(--accent);border-color:rgba(216,58,22,.3)}

.results-empty{padding:3rem 0;text-align:center;color:var(--ink-3)}
.results-empty p{font-size:.92rem;margin-top:.5rem}
.results-empty .big{font-size:2rem}

/* ── Group headings ─────────────────────────────────────────── */
.result-group-label{font-family:var(--f-m);font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-weight:600;padding:.75rem 0 .35rem;margin-top:.5rem}
.result-group-label:first-child{margin-top:0;padding-top:0}

/* ── Sidebar ────────────────────────────────────────────────── */
.sidebar-card{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-lg);padding:1.1rem 1.2rem;margin-bottom:1rem}
.sidebar-title{font-family:var(--f-m);font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:.75rem}
.genre-cloud{display:flex;flex-wrap:wrap;gap:.4rem}
.genre-pill{padding:.28rem .65rem;border-radius:99px;font-family:var(--f-m);font-size:.75rem;font-weight:500;background:transparent;border:1px solid var(--line-2);color:var(--ink-2);cursor:pointer;transition:all .13s;text-decoration:none;display:inline-block}
.genre-pill:hover{border-color:var(--ink-3);color:var(--ink)}
.genre-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

.refine-link{display:block;font-size:.82rem;color:var(--ink-2);text-decoration:none;padding:.45rem 0;border-bottom:1px solid var(--line);transition:color .12s}
.refine-link:last-child{border-bottom:none;padding-bottom:0}
.refine-link:first-child{padding-top:0}
.refine-link:hover{color:var(--ink)}
.refine-link.active{color:var(--accent);font-weight:500}

/* ── Skeleton ───────────────────────────────────────────────── */
.skel{background:linear-gradient(90deg,var(--surface) 25%,var(--surface-2) 50%,var(--surface) 75%);background-size:200% 100%;animation:skel-shimmer 1.4s ease infinite;border-radius:var(--r-md)}
@keyframes skel-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Splash ─────────────────────────────────────────────────── */
.search-splash{padding:4rem 0;text-align:center;color:var(--ink-3)}
.search-splash .big{font-size:2.5rem;margin-bottom:.75rem}
.search-splash p{font-size:.92rem;max-width:360px;margin:0 auto;line-height:1.55}

/* ── Responsive ─────────────────────────────────────────────── */
@media(max-width:760px){
  .search-layout{grid-template-columns:1fr}
  .sidebar{order:3}
}
@media(max-width:520px){
  .search-hero{padding:1.6rem 0 1rem}
  .results-counts{margin-left:0;width:100%}
}
.load-more-btn{display:block;width:100%;margin-top:.85rem;padding:.7rem 1rem;background:transparent;border:1px dashed var(--line-2);border-radius:var(--r-md);font-family:var(--f-m);font-size:.82rem;color:var(--ink-3);cursor:pointer;transition:all .15s;text-align:center}
.load-more-btn:hover{border-color:var(--accent);color:var(--accent-ink);background:rgba(255,80,41,.04)}
</style>
</head>
<body>
<div class="bg-canvas">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
</div>

<div class="site-shell">
<nav class="nav">
  <div class="nav-left">
    <a href="/" style="text-decoration:none;color:inherit"><div class="brand">i<em>HYPE</em></div></a>
    <span style="font-family:var(--f-m);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;padding:.2rem .5rem;border-radius:99px;background:rgba(255,80,41,.1);border:1px solid rgba(255,80,41,.22);color:var(--accent)">Beta</span>
  </div>
  <div class="nav-right">
    <button class="role-pill fan"><span class="av">·</span><span class="name">…</span><span class="ctx">▾</span></button>
  </div>
</nav>

<div class="page">
  <div class="search-hero">
    <h1>Search <em>everything.</em></h1>
    <div class="search-bar">
      <span class="search-icon" aria-hidden="true">⌕</span>
      <input id="searchInput" class="search-input" type="search" autocomplete="off" spellcheck="false"
        placeholder="Artists, songs, shows, genres…" aria-label="Search">
      <button id="searchClear" class="search-clear" aria-label="Clear search">✕</button>
    </div>
    <div class="type-filters" role="group" aria-label="Filter by type">
      <button class="type-filter active" data-type="all">All</button>
      <button class="type-filter" data-type="artist">Artists</button>
      <button class="type-filter" data-type="song">Songs</button>
      <button class="type-filter" data-type="show">Shows</button>
      <button class="type-filter" data-type="genre">Genres</button>
    </div>
  </div>

  <div id="searchLayout" class="search-layout" style="display:none">
    <div id="resultsCol">
      <div id="resultsHeader" class="results-header">
        <span id="resultsTitle" class="results-title"></span>
        <span id="resultsMeta" class="results-meta"></span>
        <div id="resultsCounts" class="results-counts"></div>
      </div>
      <div id="resultsList" class="result-list"></div>
    </div>
    <aside class="sidebar">
      <div id="genreCard" class="sidebar-card" style="display:none">
        <div class="sidebar-title">Browse genres</div>
        <div id="genreCloud" class="genre-cloud"></div>
      </div>
      <div class="sidebar-card">
        <div class="sidebar-title">Refine search</div>
        <a href="/discover" class="refine-link">Recommendation Engine →</a>
        <a href="/tickets" class="refine-link">Browse shows →</a>
        <a href="/hype" class="refine-link">HYPE charts →</a>
      </div>
    </aside>
  </div>

  <div id="searchSplash" class="search-splash">
    <div class="big">⌕</div>
    <p>Search artists, songs, shows, and genres — everything on iHYPE in one place.</p>
  </div>
</div>
</div><!-- /site-shell -->

<script src="/ihype-shared.js" defer></script>
<script src="/ihype-user-menu.js" defer></script>
<script>
(function(){
  function esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  const searchInput   = document.getElementById('searchInput');
  const searchClear   = document.getElementById('searchClear');
  const searchLayout  = document.getElementById('searchLayout');
  const searchSplash  = document.getElementById('searchSplash');
  const resultsList   = document.getElementById('resultsList');
  const resultsTitle  = document.getElementById('resultsTitle');
  const resultsMeta   = document.getElementById('resultsMeta');
  const resultsCounts = document.getElementById('resultsCounts');
  const genreCard     = document.getElementById('genreCard');
  const genreCloud    = document.getElementById('genreCloud');

  const TYPE_ICONS  = { artist:'🎤', promoter:'🎛️', venue:'🏟️', song:'♪', show:'🎪', genre:'#' };
  const TYPE_LABELS = { artist:'Artist', promoter:'Promoter', venue:'Venue', song:'Song', show:'Show', genre:'Genre' };
  const GROUP_ORDER = ['artist','venue','promoter','show','song','genre'];

  let activeType = 'all';
  let searchTimer = null;
  let lastQuery = '';

  /* ── Type filters ─────────────────────────────────────────── */
  document.querySelectorAll('.type-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      activeType = btn.dataset.type;
      document.querySelectorAll('.type-filter').forEach(b => b.classList.toggle('active', b === btn));
      const q = searchInput.value.trim();
      if(q) runSearch(q);
      pushState(q, activeType);
    });
  });

  /* ── Search input ─────────────────────────────────────────── */
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    searchClear.style.display = q ? '' : 'none';
    clearTimeout(searchTimer);
    if(!q){ showSplash(); pushState('', activeType); return; }
    searchTimer = setTimeout(() => { runSearch(q); pushState(q, activeType); }, 300);
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchClear.style.display = 'none';
    showSplash();
    pushState('', activeType);
    searchInput.focus();
  });

  /* ── URL state ────────────────────────────────────────────── */
  function pushState(q, type){
    const params = new URLSearchParams();
    if(q) params.set('q', q);
    if(type && type !== 'all') params.set('type', type);
    const url = '/search' + (params.toString() ? '?' + params.toString() : '');
    history.replaceState(null, '', url);
    document.title = q ? `"${q}" · Search · iHYPE` : 'Search · iHYPE';
  }

  function showSplash(){
    searchLayout.style.display = 'none';
    searchSplash.style.display = '';
  }

  /* ── Search ───────────────────────────────────────────────── */
  async function runSearch(q){
    lastQuery = q;
    searchLayout.style.display = '';
    searchSplash.style.display = 'none';

    resultsTitle.textContent = `Results for "${q}"`;
    resultsMeta.textContent = '';
    resultsCounts.innerHTML = '';
    resultsList.innerHTML = [1,2,3,4,5].map(()=>
      '<div class="result-row skel" style="height:54px;border:none"></div>'
    ).join('');

    try{
      const url = '/api/search?q='+encodeURIComponent(q)+'&limit=60'+(activeType!=='all'?'&type='+activeType:'');
      const res = await fetch(url, {credentials:'same-origin'});
      if(!res.ok) throw new Error();
      const data = await res.json();
      if(q !== lastQuery) return; // stale
      renderResults(q, data);
    } catch(e){
      resultsList.innerHTML = '<div class="results-empty"><div class="big">⚠</div><p>Search unavailable — try again.</p></div>';
    }
  }

  function renderResults(q, data){
    const results = data.results || [];
    const counts  = data.counts  || {};

    // Header
    resultsTitle.textContent = results.length ? `Results for "${q}"` : `No results for "${q}"`;
    resultsMeta.textContent  = results.length
      ? results.length + (results.length === 1 ? ' result' : ' results')
      : '';

    // Count chips
    const chipDefs = [
      { key:'artists',  label:'Artists' },
      { key:'venues',   label:'Venues'  },
      { key:'songs',    label:'Songs'   },
      { key:'shows',    label:'Shows'   },
      { key:'genres',   label:'Genres'  },
    ];
    resultsCounts.innerHTML = chipDefs
      .filter(c => counts[c.key] > 0)
      .map(c => `<span class="count-chip has">${counts[c.key]} ${c.label}</span>`)
      .join('') || '';

    // Genre sidebar
    const genres = data.genres || [];
    if(genres.length){
      genreCard.style.display = '';
      genreCloud.innerHTML = genres.slice(0,20).map(g =>
        `<a href="/search?q=${encodeURIComponent(g)}&type=artist" class="genre-pill${g.toLowerCase()===q.toLowerCase()?' active':''}">${esc(g)}</a>`
      ).join('');
    } else {
      genreCard.style.display = 'none';
    }

    if(!results.length){
      resultsList.innerHTML =
        '<div class="results-empty">'+
          '<div class="big">🔍</div>'+
          '<p>No results. Try a different name, genre, or city.</p>'+
        '</div>';
      return;
    }

    // Group results by type
    const grouped = {};
    results.forEach(r => {
      if(!grouped[r.type]) grouped[r.type] = [];
      grouped[r.type].push(r);
    });

    resultsList.innerHTML = '';
    const showGroups = activeType === 'all';
    const PAGE_SIZE = 15;

    // Build all row elements in order (preserving group labels)
    const allRows = []; // [{node, isLabel}]
    GROUP_ORDER.forEach(type => {
      const items = grouped[type];
      if(!items) return;

      if(showGroups && items.length){
        const lbl = document.createElement('div');
        lbl.className = 'result-group-label';
        lbl.textContent = TYPE_LABELS[type] + (items.length > 1 ? 's' : '');
        allRows.push({ node: lbl, isLabel: true });
      }

      items.forEach(r => {
        const row = document.createElement('a');
        row.className = 'result-row';
        row.href = hrefFor(r, q);

        if(r.type === 'genre'){
          row.addEventListener('click', e => {
            e.preventDefault();
            searchInput.value = r.name;
            searchClear.style.display = '';
            activeType = 'artist';
            document.querySelectorAll('.type-filter').forEach(b => b.classList.toggle('active', b.dataset.type==='artist'));
            runSearch(r.name);
            pushState(r.name, 'artist');
          });
        }

        const icon  = TYPE_ICONS[r.type]  || '?';
        const label = TYPE_LABELS[r.type] || r.type;
        row.innerHTML =
          `<div class="result-thumb ${esc(r.type)}">${esc(icon)}</div>`+
          `<div style="overflow:hidden">`+
            `<div class="result-name">${esc(r.name)}</div>`+
            `<div class="result-sub">${esc(r.subtitle||'')}</div>`+
          `</div>`+
          `<span class="result-badge ${esc(r.type)}">${esc(label)}</span>`;
        allRows.push({ node: row, isLabel: false });
      });
    });

    // Count non-label rows for paging
    const dataRows = allRows.filter(r => !r.isLabel);
    let shownCount = 0;
    let nextIdx = 0;
    function appendBatch(){
      const old = resultsList.querySelector('.load-more-btn');
      if(old) old.remove();
      let added = 0;
      while(nextIdx < allRows.length && added < PAGE_SIZE){
        const r = allRows[nextIdx++];
        resultsList.appendChild(r.node);
        if(!r.isLabel) added++;
      }
      shownCount += added;

      // Update meta
      resultsMeta.textContent = (shownCount < dataRows.length
        ? `Showing ${shownCount} of ${dataRows.length} results`
        : `${dataRows.length} result${dataRows.length===1?'':'s'}`);

      if(nextIdx < allRows.length){
        const remaining = dataRows.length - shownCount;
        const btn = document.createElement('button');
        btn.className = 'load-more-btn';
        btn.textContent = `Show ${Math.min(PAGE_SIZE, remaining)} more result${Math.min(PAGE_SIZE,remaining)===1?'':'s'} →`;
        btn.addEventListener('click', appendBatch);
        resultsList.appendChild(btn);
      }
    }

    appendBatch();
  }

  function hrefFor(r, q){
    if(r.type === 'artist' || r.type === 'venue' || r.type === 'promoter'){
      return r.slug ? '/profile/' + r.slug : '#';
    }
    if(r.type === 'song')  return r.slug ? '/profile/' + r.slug : '#';
    if(r.type === 'show')  return '/tickets';
    if(r.type === 'genre') return '#'; // handled via click listener
    return '#';
  }

  /* ── Init from URL ────────────────────────────────────────── */
  const params = new URLSearchParams(location.search);
  const initQ    = params.get('q')?.trim() || '';
  const initType = params.get('type') || 'all';

  if(initType !== 'all'){
    activeType = initType;
    document.querySelectorAll('.type-filter').forEach(b =>
      b.classList.toggle('active', b.dataset.type === initType)
    );
  }

  if(initQ){
    searchInput.value = initQ;
    searchClear.style.display = '';
    document.title = `"${initQ}" · Search · iHYPE`;
    runSearch(initQ);
  }
})();
</script>
</body>
</html>
