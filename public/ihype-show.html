<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Show · iHYPE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ihype-shared.css">
<style>
/* ── Hero ────────────────────────────────────────────────────── */
.show-hero{position:relative;padding:2.2rem 0 1.8rem;border-bottom:1px solid var(--line);margin-bottom:2rem}
.show-hero-inner{display:flex;gap:2rem;align-items:flex-start;flex-wrap:wrap}
.show-poster{width:160px;height:160px;flex-shrink:0;border-radius:var(--r-lg);object-fit:cover;background:linear-gradient(135deg,#d83a16,#e89060);display:flex;align-items:center;justify-content:center;font-size:3.5rem;overflow:hidden}
.show-poster img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.show-meta-wrap{flex:1;min-width:0}
.show-title{font-family:var(--f-h);font-size:clamp(1.6rem,5vw,2.6rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin:0 0 .7rem}
.show-badges{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.85rem}
.s-badge{font-family:var(--f-m);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:.2rem .55rem;border-radius:99px;border:1px solid;white-space:nowrap}
.s-badge.live{color:var(--accent);border-color:rgba(255,80,41,.3);background:rgba(255,80,41,.08)}
.s-badge.scheduled{color:var(--r-venue);border-color:rgba(34,229,212,.3);background:rgba(34,229,212,.06)}
.s-badge.ended{color:var(--ink-3);border-color:var(--line-2);background:transparent}
.s-badge.radio{color:var(--r-fan);border-color:rgba(185,131,255,.3);background:rgba(185,131,255,.06)}
.s-badge.ticketed{color:var(--ink-2);border-color:var(--line-2)}
.show-date-line{font-size:.95rem;color:var(--ink-2);line-height:1.6}
.show-date-line strong{color:var(--ink);font-weight:600}

/* ── Layout ──────────────────────────────────────────────────── */
.show-layout{display:grid;grid-template-columns:1fr 300px;gap:2rem;align-items:start}
@media(max-width:760px){.show-layout{grid-template-columns:1fr}.show-sidebar{order:-1}}

/* ── Sections ────────────────────────────────────────────────── */
.section{margin-bottom:2rem}
.section-title{font-family:var(--f-m);font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:.85rem;display:flex;align-items:center;gap:.5rem}
.section-title::after{content:'';flex:1;height:1px;background:var(--line)}
.show-desc{font-size:.95rem;color:var(--ink-2);line-height:1.75;white-space:pre-wrap}

/* ── Participant card ─────────────────────────────────────────── */
.participant-row{display:flex;align-items:center;gap:.85rem;padding:.7rem 0;border-bottom:1px solid var(--line);text-decoration:none;color:inherit;transition:opacity .12s}
.participant-row:last-child{border-bottom:none}
.participant-row:hover{opacity:.8}
.participant-av{width:44px;height:44px;border-radius:var(--r-md);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;color:#fff;overflow:hidden}
.participant-av.artist{background:linear-gradient(135deg,#d83a16,#e89060)}
.participant-av.venue{background:linear-gradient(135deg,#1f8782,#7fc4c0)}
.participant-av.promoter{background:linear-gradient(135deg,#7a4fb5,#c08fe8)}
.participant-av img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.participant-name{font-weight:600;font-size:.9rem;color:var(--ink)}
.participant-role{font-family:var(--f-m);font-size:.7rem;color:var(--ink-3);margin-top:.08rem}

/* ── Radio tracklist ──────────────────────────────────────────── */
.track-row{display:grid;grid-template-columns:28px 1fr;gap:.65rem;align-items:center;padding:.55rem .7rem;border-radius:var(--r-sm);background:var(--bg-2);border:1px solid var(--line);margin-bottom:.3rem;transition:border-color .14s}
.track-row:hover{border-color:var(--line-2)}
.track-num{font-family:var(--f-m);font-size:.72rem;color:var(--ink-4);text-align:center}
.track-title{font-size:.88rem;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-artist{font-family:var(--f-m);font-size:.7rem;color:var(--ink-3);margin-top:.08rem}

/* ── Sidebar cards ────────────────────────────────────────────── */
.sidebar-card{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-lg);padding:1.1rem 1.2rem;margin-bottom:1rem}
.sidebar-title{font-family:var(--f-m);font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:.75rem}
.sidebar-row{display:flex;gap:.6rem;align-items:flex-start;padding:.4rem 0;border-bottom:1px solid var(--line);font-size:.85rem}
.sidebar-row:last-child{border-bottom:none;padding-bottom:0}
.sidebar-icon{font-size:.9rem;flex-shrink:0;margin-top:.05rem}
.sidebar-val{color:var(--ink-2);line-height:1.5}

/* ── Ticket card ──────────────────────────────────────────────── */
.ticket-price{font-family:var(--f-d);font-size:2rem;font-weight:800;color:var(--ink);letter-spacing:-.02em;line-height:1}
.ticket-price-label{font-family:var(--f-m);font-size:.7rem;color:var(--ink-3);text-transform:uppercase;letter-spacing:.1em;margin-top:.2rem;margin-bottom:.8rem}
.ticket-avail{font-family:var(--f-m);font-size:.74rem;color:var(--ink-3);margin-bottom:.75rem}
.ticket-avail strong{color:var(--ink-2)}

/* ── HYPE button ──────────────────────────────────────────────── */
.hype-count-big{font-family:var(--f-d);font-size:2rem;font-weight:700;color:var(--accent);letter-spacing:-.02em;line-height:1}
.hype-label{font-family:var(--f-m);font-size:.7rem;color:var(--ink-3);text-transform:uppercase;letter-spacing:.12em;margin-top:.25rem}
.hype-btn{display:inline-flex;align-items:center;gap:.45rem;padding:.55rem 1.3rem;border-radius:99px;font-family:var(--f-d);font-size:.88rem;font-weight:700;cursor:pointer;transition:all .18s;border:2px solid var(--accent);background:transparent;color:var(--accent);white-space:nowrap;margin-top:.75rem}
.hype-btn:hover:not(:disabled){background:var(--accent);color:#fff;transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,80,41,.28)}
.hype-btn:active:not(:disabled){transform:translateY(0)}
.hype-btn.hyped{background:color-mix(in srgb,var(--accent) 12%,transparent);border-color:color-mix(in srgb,var(--accent) 35%,transparent);color:var(--accent);cursor:default}
.hype-btn:disabled{opacity:.65;cursor:default}
@keyframes hype-pop{0%{transform:scale(1)}40%{transform:scale(1.22)}80%{transform:scale(.95)}100%{transform:scale(1)}}
.hype-count-pop{animation:hype-pop .35s ease forwards}

/* ── Split breakdown ──────────────────────────────────────────── */
.split-row{display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--line);font-size:.82rem}
.split-row:last-child{border-bottom:none}
.split-label{color:var(--ink-3)}
.split-val{font-family:var(--f-m);font-weight:600;color:var(--ink-2)}
.split-val.zero{color:var(--r-venue)}

/* ── Tags ─────────────────────────────────────────────────────── */
.tag-wrap{display:flex;flex-wrap:wrap;gap:.4rem}
.tag-pill{padding:.26rem .65rem;border-radius:99px;font-family:var(--f-m);font-size:.74rem;background:var(--bg-2);border:1px solid var(--line-2);color:var(--ink-3)}

/* ── Skeleton ─────────────────────────────────────────────────── */
.skel{background:linear-gradient(90deg,var(--surface) 25%,var(--surface-2) 50%,var(--surface) 75%);background-size:200% 100%;animation:skel-shimmer 1.4s ease infinite;border-radius:var(--r-md)}
@keyframes skel-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Not found ────────────────────────────────────────────────── */
.not-found{padding:5rem 0;text-align:center;color:var(--ink-3)}
.not-found .big{font-size:3rem;margin-bottom:1rem}
.not-found p{font-size:.96rem;max-width:340px;margin:.5rem auto 1.5rem}

/* ── Responsive ───────────────────────────────────────────────── */
@media(max-width:520px){
  .show-poster{width:100px;height:100px;font-size:2.5rem}
}
</style>
</head>
<body>
<div class="bg-canvas" aria-hidden="true">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
</div>

<div class="site-shell">
<nav class="nav">
  <div class="nav-left">
    <a href="/" style="text-decoration:none;color:inherit"><div class="brand">i<em>HYPE</em></div></a>
    <span style="font-family:var(--f-m);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;padding:.2rem .5rem;border-radius:99px;background:rgba(255,80,41,.1);border:1px solid rgba(255,80,41,.22);color:var(--accent)">Beta</span>
  </div>
  <div class="nav-right">
    <button class="role-pill fan"><span class="av">·</span><span class="name">…</span><span class="ctx">▾</span></button>
  </div>
</nav>

<div class="page">
  <!-- Skeleton -->
  <div id="showSkeleton">
    <div style="display:flex;gap:2rem;align-items:flex-start;padding:2rem 0 1.5rem;border-bottom:1px solid var(--line);margin-bottom:2rem;flex-wrap:wrap">
      <div class="skel" style="width:160px;height:160px;border-radius:var(--r-lg);flex-shrink:0"></div>
      <div style="flex:1;min-width:180px">
        <div class="skel" style="height:2.4rem;width:320px;max-width:100%;margin-bottom:.75rem"></div>
        <div class="skel" style="height:.75rem;width:160px;margin-bottom:.5rem"></div>
        <div class="skel" style="height:.75rem;width:220px"></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 300px;gap:2rem">
      <div>
        <div class="skel" style="height:80px;margin-bottom:1rem"></div>
        <div class="skel" style="height:120px"></div>
      </div>
      <div>
        <div class="skel" style="height:180px;border-radius:var(--r-lg)"></div>
      </div>
    </div>
  </div>

  <!-- Show content -->
  <div id="showContent" style="display:none"></div>

  <!-- Not found -->
  <div id="showNotFound" style="display:none" class="not-found">
    <div class="big">🎤</div>
    <p>This show doesn't exist or has been removed.</p>
    <a href="/tickets" class="btn btn-ghost btn-sm">Browse shows →</a>
  </div>
</div>
</div>

<button class="a11y-btn" id="openA11y" style="position:fixed;bottom:1.25rem;left:1.25rem;z-index:200"><span aria-hidden="true">⊙</span><span>Accessibility</span></button>
<div class="a11y-panel-overlay" id="a11yOverlay"></div>
<aside class="a11y-panel" id="a11yPanel" role="dialog" aria-label="Accessibility settings">
  <div class="a11y-panel-head"><h3>Accessibility</h3><button class="a11y-panel-close" id="closeA11y">×</button></div>
  <div class="a11y-section"><h4>Language</h4>
    <div class="toggle-pair" data-cols="5" role="radiogroup">
      <button class="active" data-lang="en">EN</button><button data-lang="es">ES</button><button data-lang="pt">PT</button><button data-lang="fr">FR</button><button data-lang="de">DE</button><button data-lang="ar">AR</button><button data-lang="hi">HI</button><button data-lang="ja">JA</button><button data-lang="ko">KO</button><button data-lang="zh">ZH</button>
    </div>
  </div>
  <div class="a11y-section"><h4>Text size</h4>
    <div class="toggle-pair" data-cols="3" role="radiogroup">
      <button class="active" data-size="default">Default</button><button data-size="large">Large</button><button data-size="xlarge">XL</button>
    </div>
  </div>
  <div class="a11y-section"><h4>Reading</h4>
    <div class="a11y-row toggle"><div><div class="name">Dyslexia-friendly</div><div class="desc">Wider spacing</div></div><button class="switch" data-toggle="dyslexia"></button></div>
    <div class="a11y-row toggle"><div><div class="name">High contrast</div><div class="desc">Pure black text</div></div><button class="switch" data-toggle="contrast"></button></div>
  </div>
  <div class="a11y-section"><h4>Motion</h4>
    <div class="a11y-row toggle"><div><div class="name">Reduced motion</div><div class="desc">Disable animations</div></div><button class="switch" data-toggle="motion"></button></div>
  </div>
  <div class="a11y-panel-foot">Settings save automatically.</div>
</aside>

<script src="/ihype-shared.js" defer></script>
<script src="/ihype-user-menu.js" defer></script>
<script>
(function () {
  'use strict';

  // ── Helpers ───────────────────────────────────────────────────────────────
  function esc(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmt(n) { if (!n) return '0'; if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'M'; if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'')+'k'; return String(n); }
  function fmtCents(c) { return '$' + (c / 100).toFixed(2).replace(/\.00$/, ''); }

  function fmtDateFull(iso) {
    if (!iso) return 'TBD';
    try {
      return new Date(iso).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    } catch(e) { return ''; }
  }
  function fmtTime(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
    } catch(e) { return ''; }
  }

  function show(id) { var el = document.getElementById(id); if (el) el.style.display = ''; }
  function hide(id) { var el = document.getElementById(id); if (el) el.style.display = 'none'; }

  // ── Extract slug from URL /shows/:slug ────────────────────────────────────
  var slug = location.pathname.replace(/^\/shows\//, '').split('/')[0];

  if (!slug) {
    hide('showSkeleton');
    show('showNotFound');
    return;
  }

  // ── Fetch show ────────────────────────────────────────────────────────────
  fetch('/api/shows/' + encodeURIComponent(slug), { credentials: 'same-origin' })
    .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function (data) { render(data.show); })
    .catch(function () {
      hide('showSkeleton');
      show('showNotFound');
    });

  // ── Render ────────────────────────────────────────────────────────────────
  function render(s) {
    hide('showSkeleton');
    document.title = s.title + ' · iHYPE';

    // ── Status badge ──────────────────────────────────────────────────────
    var statusBadge = '';
    if (s.status === 'LIVE')       statusBadge = '<span class="s-badge live">🔴 Live now</span>';
    else if (s.status === 'SCHEDULED') statusBadge = '<span class="s-badge scheduled">Upcoming</span>';
    else if (s.status === 'ENDED') statusBadge = '<span class="s-badge ended">Ended</span>';
    if (s.isRadioShow)  statusBadge += '<span class="s-badge radio">Radio show</span>';
    if (s.isTicketed)   statusBadge += '<span class="s-badge ticketed">Ticketed</span>';

    // ── Poster ────────────────────────────────────────────────────────────
    var posterHTML = s.posterImage
      ? '<div class="show-poster"><img src="' + esc(s.posterImage) + '" alt="' + esc(s.title) + '" loading="lazy"></div>'
      : '<div class="show-poster" aria-hidden="true">' + (s.isRadioShow ? '📻' : '🎤') + '</div>';

    // ── Date / venue line ──────────────────────────────────────────────────
    var dateStr  = s.startsAt ? fmtDateFull(s.startsAt) : 'Date TBD';
    var timeStr  = s.startsAt ? fmtTime(s.startsAt) : '';
    var endStr   = s.endsAt ? ' – ' + fmtTime(s.endsAt) : '';
    var venueLine = '';
    if (s.venueProfile) {
      var vLoc = [s.venueProfile.city, s.venueProfile.stateRegion].filter(Boolean).join(', ');
      venueLine = ' · <a href="/profile/' + esc(s.venueProfile.slug) + '" style="color:var(--ink-2);text-decoration:none;font-weight:600">' + esc(s.venueProfile.name) + '</a>' + (vLoc ? ' <span style="color:var(--ink-3)">(' + esc(vLoc) + ')</span>' : '');
    }

    // ── Participants ───────────────────────────────────────────────────────
    var participants = [];
    if (s.headlinerProfile) participants.push({ profile: s.headlinerProfile, role: 'Headliner', cssClass: s.headlinerProfile.type === 'VENUE' ? 'venue' : 'artist' });
    if (s.promoterProfile)  participants.push({ profile: s.promoterProfile,  role: 'Promoter',  cssClass: 'promoter' });
    if (s.venueProfile)     participants.push({ profile: s.venueProfile,     role: 'Venue',     cssClass: 'venue' });

    var participantsHTML = participants.length ? participants.map(function (p) {
      var av = p.profile.avatarImage
        ? '<div class="participant-av ' + esc(p.cssClass) + '"><img src="' + esc(p.profile.avatarImage) + '" alt="' + esc(p.profile.name) + '"></div>'
        : '<div class="participant-av ' + esc(p.cssClass) + '">' + esc(p.profile.name.charAt(0).toUpperCase()) + '</div>';
      var genres = (p.profile.genres || []).slice(0, 2).join(', ');
      return '<a href="/profile/' + esc(p.profile.slug) + '" class="participant-row">' +
        av +
        '<div><div class="participant-name">' + esc(p.profile.name) + '</div>' +
        '<div class="participant-role">' + esc(p.role) + (genres ? ' · ' + esc(genres) : '') + '</div></div>' +
      '</a>';
    }).join('') : '';

    // ── Radio tracklist ────────────────────────────────────────────────────
    var tracksHTML = '';
    if (s.isRadioShow && s.productionPlan) {
      var plan = typeof s.productionPlan === 'string' ? JSON.parse(s.productionPlan) : s.productionPlan;
      var tracks = (plan.tracks || []).sort(function(a, b) { return a.position - b.position; });
      if (tracks.length) {
        tracksHTML = '<div class="section"><div class="section-title">Tracklist · ' + tracks.length + ' songs</div>' +
          tracks.map(function (t, i) {
            var artistLink = t.artistProfileSlug
              ? '<a href="/profile/' + esc(t.artistProfileSlug) + '" style="color:var(--r-fan);text-decoration:none">' + esc(t.artistName) + '</a>'
              : esc(t.artistName);
            return '<div class="track-row">' +
              '<div class="track-num">' + (i+1) + '</div>' +
              '<div><div class="track-title">' + esc(t.title) + '</div>' +
              '<div class="track-artist">' + artistLink + '</div></div>' +
            '</div>';
          }).join('') +
        '</div>';
      }
    }

    // ── Tags ──────────────────────────────────────────────────────────────
    var visibleTags = (s.tags || []).filter(function (t) { return t !== 'radio-show'; });
    var tagsHTML = visibleTags.length
      ? '<div class="section"><div class="section-title">Tags</div><div class="tag-wrap">' +
          visibleTags.map(function (t) { return '<span class="tag-pill">' + esc(t) + '</span>'; }).join('') +
        '</div></div>'
      : '';

    // ── Sidebar: ticket card ──────────────────────────────────────────────
    var ticketHTML = '';
    if (s.isTicketed && s.status !== 'ENDED') {
      var price = fmtCents(s.ticketPriceCents || 0);
      var soldOut = s.ticketCapacity !== null && s.ticketsSoldCount >= s.ticketCapacity;
      var remaining = s.ticketCapacity !== null ? s.ticketCapacity - s.ticketsSoldCount : null;
      var availStr = s.ticketCapacity !== null
        ? '<strong>' + (soldOut ? '0' : remaining) + '</strong> of ' + s.ticketCapacity + ' remaining'
        : 'Open capacity';
      var openAt = s.ticketingOpensAt ? 'Ticketing opens ' + fmtDateFull(s.ticketingOpensAt) : '';

      ticketHTML = '<div class="sidebar-card">' +
        '<div class="ticket-price" id="hype-count-display">' + price + '</div>' +
        '<div class="ticket-price-label">Per ticket · $0 platform fee</div>' +
        '<div class="ticket-avail">' + availStr + '</div>' +
        (openAt ? '<div style="font-family:var(--f-m);font-size:.74rem;color:var(--ink-3);margin-bottom:.75rem">' + esc(openAt) + '</div>' : '') +
        '<a href="/tickets" class="btn btn-primary btn-block' + (soldOut ? ' btn-disabled' : '') + '">' +
          (soldOut ? 'Sold out' : 'Get tickets →') +
        '</a>' +
      '</div>';
    }

    // ── Sidebar: HYPE card ────────────────────────────────────────────────
    var hypeHTML = '<div class="sidebar-card" style="text-align:center">' +
      '<div class="hype-count-big" id="show-hype-count">' + fmt(s.hypeCount || 0) + '</div>' +
      '<div class="hype-label">HYPE</div>' +
      '<button id="hype-btn" class="hype-btn" type="button" aria-label="HYPE ' + esc(s.title) + '">' +
        '<span>▲</span><span id="hype-btn-label">HYPE this</span>' +
      '</button>' +
    '</div>';

    // ── Sidebar: event info ────────────────────────────────────────────────
    var infoRows = [];
    if (s.startsAt) infoRows.push(['📅', '<strong>' + esc(dateStr) + '</strong>']);
    if (s.startsAt) infoRows.push(['🕐', esc(timeStr + endStr)]);
    if (s.venueProfile) {
      var vLoc2 = [s.venueProfile.city, s.venueProfile.stateRegion, s.venueProfile.country].filter(Boolean).join(', ');
      if (vLoc2) infoRows.push(['📍', esc(vLoc2)]);
    }

    var infoHTML = infoRows.length
      ? '<div class="sidebar-card"><div class="sidebar-title">Event details</div>' +
          infoRows.map(function(r) {
            return '<div class="sidebar-row"><span class="sidebar-icon">' + r[0] + '</span><span class="sidebar-val">' + r[1] + '</span></div>';
          }).join('') +
        '</div>'
      : '';

    // ── Sidebar: split breakdown (ticketed shows) ─────────────────────────
    var splitHTML = '';
    if (s.isTicketed && s.venuePayoutPercent !== null) {
      var vPct = s.venuePayoutPercent || 0;
      var aPct = s.artistPayoutPercent || 0;
      var pPct = s.promoterPayoutPercent || 0;

      splitHTML = '<div class="sidebar-card"><div class="sidebar-title">Revenue split · auditable</div>' +
        '<div class="split-row"><span class="split-label">Venue</span><span class="split-val">' + vPct + '%</span></div>' +
        '<div class="split-row"><span class="split-label">Artist</span><span class="split-val">' + aPct + '%</span></div>' +
        '<div class="split-row"><span class="split-label">Promoter</span><span class="split-val">' + pPct + '%</span></div>' +
        '<div class="split-row"><span class="split-label">iHYPE fee</span><span class="split-val zero">$0</span></div>' +
        (s.bookingLegalNotes ? '<p style="font-size:.74rem;color:var(--ink-3);margin:.6rem 0 0;line-height:1.5">' + esc(s.bookingLegalNotes.slice(0,200)) + '</p>' : '') +
      '</div>';
    }

    // ── Sidebar: explore ──────────────────────────────────────────────────
    var exploreHTML = '<div class="sidebar-card"><div class="sidebar-title">Explore</div>' +
      '<a href="/tickets" class="refine-link" style="display:block;font-size:.82rem;color:var(--ink-2);text-decoration:none;padding:.4rem 0;border-bottom:1px solid var(--line);transition:color .12s">All shows →</a>' +
      '<a href="/discover" class="refine-link" style="display:block;font-size:.82rem;color:var(--ink-2);text-decoration:none;padding:.4rem 0;transition:color .12s">Recommendation Engine →</a>' +
    '</div>';

    // ── Assemble ──────────────────────────────────────────────────────────
    var html = '<div class="show-hero">' +
      '<nav aria-label="Breadcrumb" style="font-family:var(--f-m);font-size:.74rem;color:var(--ink-3);margin-bottom:1.2rem">' +
        '<a href="/tickets" style="color:var(--ink-3);text-decoration:none">Shows</a>' +
        '<span style="margin:0 .4rem">›</span>' +
        '<span>' + esc(s.title) + '</span>' +
      '</nav>' +
      '<div class="show-hero-inner">' +
        posterHTML +
        '<div class="show-meta-wrap">' +
          '<div class="show-badges">' + statusBadge + '</div>' +
          '<h1 class="show-title">' + esc(s.title) + '</h1>' +
          '<div class="show-date-line"><strong>' + esc(dateStr) + '</strong>' +
            (timeStr ? ' · ' + esc(timeStr + endStr) : '') +
            venueLine +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    '<div class="show-layout">' +
      '<div>' +
        (s.description ? '<div class="section"><div class="section-title">About this show</div><p class="show-desc">' + esc(s.description) + '</p></div>' : '') +
        (participantsHTML ? '<div class="section"><div class="section-title">Who\'s playing</div>' + participantsHTML + '</div>' : '') +
        tracksHTML +
        tagsHTML +
      '</div>' +
      '<aside class="show-sidebar">' +
        ticketHTML +
        hypeHTML +
        infoHTML +
        splitHTML +
        exploreHTML +
      '</aside>' +
    '</div>';

    document.getElementById('showContent').innerHTML = html;
    show('showContent');

    // ── Wire HYPE button ──────────────────────────────────────────────────
    wireHypeButton(s.id, s.title);
  }

  // ── HYPE button ───────────────────────────────────────────────────────────
  function wireHypeButton(showId, showTitle) {
    var btn     = document.getElementById('hype-btn');
    var countEl = document.getElementById('show-hype-count');
    var labelEl = document.getElementById('hype-btn-label');
    if (!btn || !countEl || !labelEl) return;

    var hyped   = false;
    var working = false;

    btn.addEventListener('click', async function () {
      if (hyped || working) return;
      working = true;
      btn.disabled = true;
      labelEl.textContent = 'Hyping…';

      try {
        var res = await fetch('/api/hype', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ targetType: 'show', targetId: showId })
        });

        if (res.status === 401) {
          window.location.href = '/login?next=' + encodeURIComponent(location.pathname);
          return;
        }

        var data = await res.json().catch(function() { return {}; });

        if (res.ok) {
          var newCount = data.hypeCount || 0;
          countEl.textContent = fmt(newCount);
          countEl.classList.remove('hype-count-pop');
          void countEl.offsetWidth;
          countEl.classList.add('hype-count-pop');

          hyped = true;
          btn.classList.add('hyped');
          btn.disabled = false;
          working = false;
          labelEl.textContent = data.created ? 'Hyped ✓' : 'Already hyped';
          btn.setAttribute('aria-label', 'You hyped ' + showTitle);
        } else {
          labelEl.textContent = 'HYPE this';
          btn.disabled = false;
          working = false;
        }
      } catch(e) {
        labelEl.textContent = 'HYPE this';
        btn.disabled = false;
        working = false;
      }
    });
  }

})();
</script>
</body>
</html>
