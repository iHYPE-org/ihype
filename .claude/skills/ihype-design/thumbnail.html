<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>iHYPE</title>
<link rel="stylesheet" href="styles.css">
<style>
  * { box-sizing: border-box; margin: 0; }
  body { width: 1280px; height: 854px; display: flex; overflow: hidden; }
  .main { flex: 1; background: var(--accent, #ff5029); display: flex; align-items: center; justify-content: center; }
  .wm { font-family: var(--font-display, 'Syne', sans-serif); font-weight: 800; font-size: 220px; letter-spacing: -.05em; color: #0a0805; }
  .strip { width: 25%; display: flex; flex-direction: column; }
  .strip div { flex: 1; }
</style>
</head>
<body>
  <div class="main"><div class="wm">iHYPE</div></div>
  <div class="strip">
    <div style="background:#ffb84a"></div>
    <div style="background:#22e5d4"></div>
    <div style="background:#ff3e9a"></div>
    <div style="background:#b983ff"></div>
  </div>
</body>
</html>
