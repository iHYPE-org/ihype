<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg-base); }
  .label { font-family: var(--font-mono); font-size: 9px; letter-spacing: .18em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 10px; }
  .wordmark { font-family: var(--font-display); font-weight: 800; font-size: 48px; letter-spacing: -0.02em; color: var(--ink-1); line-height: 1; }
  .row { display: flex; gap: 32px; align-items: baseline; margin-top: 14px; }
  .sample { font-family: var(--font-display); font-weight: 800; letter-spacing: -0.02em; color: var(--ink-1); }
  .meta { font-family: var(--font-mono); font-size: 8px; color: var(--ink-3); letter-spacing: .12em; text-transform: uppercase; margin-top: 4px; }
</style>
</head>
<body>
  <div class="label">Syne · Display</div>
  <div class="wordmark">iHYPE</div>
  <div class="row">
    <div><div class="sample" style="font-size:38px">38</div><div class="meta">Stats</div></div>
    <div><div class="sample" style="font-size:28px">Section Title</div><div class="meta">28px · Heading</div></div>
    <div><div class="sample" style="font-size:16px">iHYPE · Workbench</div><div class="meta">16px · Wordmark small</div></div>
  </div>
</body>
</html>
