<!-- @dsCard group="Type" viewport="700x180" name="Body — DM Sans" subtitle="UI text, labels, navigation · weights 400–600" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg-base); }
  .label { font-family: var(--font-mono); font-size: 9px; letter-spacing: .18em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 14px; }
  .row { display: flex; gap: 40px; align-items: flex-start; }
  .col { flex: 1; }
  .sample { font-family: var(--font-body); color: var(--ink-1); margin-bottom: 6px; }
  .meta { font-family: var(--font-mono); font-size: 8px; color: var(--ink-3); letter-spacing: .12em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="label">DM Sans · Body / UI</div>
  <div class="row">
    <div class="col">
      <div class="sample" style="font-size:28px;font-weight:400;line-height:1.1">Maya Reyes</div>
      <div class="meta">28px · 400 · Titles</div>
    </div>
    <div class="col">
      <div class="sample" style="font-size:16px;font-weight:500">Tonight's queue</div>
      <div class="meta">16px · 500 · Subheading</div>
    </div>
    <div class="col">
      <div class="sample" style="font-size:14px;font-weight:400;color:var(--ink-2)">Search artists, shows, venues</div>
      <div class="meta">14px · 400 · Body / placeholder</div>
    </div>
    <div class="col">
      <div class="sample" style="font-size:11px;font-weight:500;color:var(--ink-3)">Empty Bottle · 1035 N Western</div>
      <div class="meta">11px · 500 · Caption</div>
    </div>
  </div>
</body>
</html>
