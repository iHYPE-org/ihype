<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 28px; background: var(--bg-base); display: flex; flex-direction: column; gap: 10px; }
  .q { font-family: 'Instrument Serif', serif; font-style: italic; color: var(--ink-1); line-height: 1.25; }
  .label { font-family: var(--font-mono); font-size: 9px; letter-spacing: .14em; color: var(--ink-3); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="label">Instrument Serif · italic · editorial only</div>
  <div class="q" style="font-size:38px; letter-spacing:-.01em">"One member, one vote."</div>
  <div class="q" style="font-size:22px; color:var(--ink-2)">Regardless of dollars given.</div>
</body>
</html>
