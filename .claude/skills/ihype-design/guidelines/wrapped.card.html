<!-- @dsCard group="Website" viewport="700x430" name="Wrapped Card" subtitle="Year-in-hype share card — gradient shimmer + stat count-up" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg-base); font-family: var(--font-body); display: flex; align-items: center; justify-content: center; padding: 22px; }
  .card { width: 300px; border-radius: 24px; overflow: hidden; position: relative; background: radial-gradient(140% 100% at 20% 0%, #2a120a 0%, #0a0805 55%); border: 1px solid rgba(255,80,41,.25); padding: 28px 26px 24px; color: var(--ink-1); animation: tilt 7s ease-in-out infinite; }
  @keyframes tilt { 0%,100% { transform: rotate(-1deg); } 50% { transform: rotate(1.2deg); } }
  .card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(115deg, transparent 30%, rgba(255,80,41,.14) 48%, rgba(255,62,154,.12) 52%, transparent 70%); background-size: 250% 100%; animation: sheen 3.6s linear infinite; pointer-events: none; }
  @keyframes sheen { from { background-position: 200% 0; } to { background-position: -50% 0; } }
  .k { font-family: var(--font-mono); font-size: .58rem; letter-spacing: .24em; text-transform: uppercase; color: var(--warn); }
  .wm { font-family: var(--font-display); font-weight: 800; font-size: 1.2rem; letter-spacing: -.04em; color: var(--accent); }
  h1 { font-family: var(--font-display); font-weight: 800; font-size: 1.7rem; letter-spacing: -.04em; line-height: 1.02; margin: 14px 0 20px; }
  .big { font-family: var(--font-display); font-weight: 800; font-size: 3.4rem; letter-spacing: -.05em; line-height: .9; background: linear-gradient(100deg, #ff5029, #ff3e9a, #b983ff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: countIn 1s cubic-bezier(.16,1,.3,1) both .3s; }
  @keyframes countIn { from { opacity: 0; transform: translateY(18px) scale(.9); } }
  .lbl { font-family: var(--font-mono); font-size: .6rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-2); margin: 6px 0 18px; }
  .stat { display: flex; justify-content: space-between; padding: 8px 0; border-top: 1px solid rgba(255,255,255,.08); font-size: .8rem; opacity: 0; animation: fade .6s forwards; }
  .stat:nth-of-type(1) { animation-delay: .5s; } .stat:nth-of-type(2) { animation-delay: .65s; } .stat:nth-of-type(3) { animation-delay: .8s; }
  @keyframes fade { to { opacity: 1; } }
  .stat b { font-family: var(--font-display); }
  .foot { font-family: var(--font-mono); font-size: .56rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3); margin-top: 16px; display: flex; justify-content: space-between; }
</style>
</head>
<body>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:baseline"><span class="wm">iHYPE</span><span class="k">Wrapped '26</span></div>
    <h1>Robin's year<br>in hype.</h1>
    <div class="big">4,218</div>
    <div class="lbl">Minutes of independent music</div>
    <div class="stat"><span>Top artist</span><b>Nyla 🔥</b></div>
    <div class="stat"><span>Shows attended</span><b>11</b></div>
    <div class="stat"><span>Promoter earnings</span><b style="color:#ff3e9a">$84.20</b></div>
    <div class="foot"><span>ihype.org/wrapped</span><span>0% fees · 70/20/10</span></div>
  </div>
</body>
</html>
