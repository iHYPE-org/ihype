<!-- @dsCard group="Spacing" viewport="700x150" name="Shadows & Glows" subtitle="Depth through glow rather than hard drop shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg-base); font-family: var(--font-mono); }
  .row { display: flex; gap: 20px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box  { background: var(--bg-surface); border-radius: 10px; width: 60px; height: 60px; border: 1px solid var(--line); }
  .name { font-size: 8px; letter-spacing: .10em; color: var(--ink-3); text-transform: uppercase; text-align: center; max-width: 80px; }
</style>
</head>
<body>
<div class="row">
  <div class="item">
    <div class="box" style="box-shadow:var(--shadow-card)"></div>
    <div class="name">card</div>
  </div>
  <div class="item">
    <div class="box" style="box-shadow:var(--shadow-raised)"></div>
    <div class="name">raised</div>
  </div>
  <div class="item">
    <div class="box" style="box-shadow:var(--shadow-play);border-radius:var(--radius-3xl)"></div>
    <div class="name">play btn</div>
  </div>
  <div class="item">
    <div class="box" style="box-shadow:var(--shadow-album);background:var(--accent);border-radius:var(--radius-3xl)"></div>
    <div class="name">album glow</div>
  </div>
  <div class="item">
    <div class="box" style="box-shadow:var(--shadow-checkin);border:1px solid var(--accent-40)"></div>
    <div class="name">checkin glow</div>
  </div>
</div>
</body>
</html>
