<!-- @dsCard group="Type" viewport="700x320" name="Type Scale" subtitle="Full scale — display through caption" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 28px; background: var(--bg-base); display: flex; flex-direction: column; gap: 0; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: none; }
  .meta { font-family: var(--font-mono); font-size: 8px; letter-spacing: .12em; color: var(--ink-3); text-transform: uppercase; width: 120px; flex-shrink: 0; }
  .sample { color: var(--ink-1); line-height: 1.1; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">Syne 800 · 54px</div>
    <div class="sample" style="font-family:'Syne',sans-serif;font-weight:800;font-size:54px;letter-spacing:-.02em">iHYPE</div>
  </div>
  <div class="row">
    <div class="meta">Syne 800 · 36px</div>
    <div class="sample" style="font-family:'Syne',sans-serif;font-weight:800;font-size:36px;letter-spacing:-.02em">9.8k Hypes</div>
  </div>
  <div class="row">
    <div class="meta">Syne 800 · 24px</div>
    <div class="sample" style="font-family:'Syne',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.015em">Tonight's Show</div>
  </div>
  <div class="row">
    <div class="meta">DM Sans 600 · 16px</div>
    <div class="sample" style="font-family:'DM Sans',sans-serif;font-weight:600;font-size:16px">Section heading · Card title</div>
  </div>
  <div class="row">
    <div class="meta">DM Sans 500 · 14px</div>
    <div class="sample" style="font-family:'DM Sans',sans-serif;font-weight:500;font-size:14px">Body medium · Button label · List item</div>
  </div>
  <div class="row">
    <div class="meta">DM Sans 400 · 13px</div>
    <div class="sample" style="font-family:'DM Sans',sans-serif;font-weight:400;font-size:13px;color:var(--ink-2)">Secondary text · Detail · Subtitle</div>
  </div>
  <div class="row">
    <div class="meta">JetBrains Mono · 9px</div>
    <div class="sample" style="font-family:'JetBrains Mono',monospace;font-weight:500;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3)">TONIGHT · 9:00 PM · DOORS OPEN</div>
  </div>
</body>
</html>
