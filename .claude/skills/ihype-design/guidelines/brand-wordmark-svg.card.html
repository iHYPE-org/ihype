<!-- @dsCard group="Brand" viewport="700x120" name="iHYPE Wordmark SVG" subtitle="SVG wordmark — inline on dark and light backgrounds" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px 36px;background:var(--bg-base);display:flex;align-items:center;gap:48px;height:72px}</style>
</head>
<body>
  <!-- Inline SVG so Syne font renders via page's @font-face -->
  <svg viewBox="0 0 200 48" height="44" xmlns="http://www.w3.org/2000/svg" style="font-family:'Syne',sans-serif;overflow:visible;flex-shrink:0">
    <text y="40" font-family="'Syne',sans-serif" font-weight="800" font-size="48" letter-spacing="-1" fill="#f0ebe5">i</text>
    <text x="23" y="40" font-family="'Syne',sans-serif" font-weight="800" font-size="48" letter-spacing="-1" fill="#ff5029">HYPE</text>
  </svg>

  <div style="width:1px;height:40px;background:var(--line)"></div>

  <!-- Light background variant -->
  <div style="background:#f0ead6;padding:10px 20px;border-radius:8px;display:flex;align-items:center">
    <svg viewBox="0 0 200 48" height="36" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
      <text y="38" font-family="'Syne',sans-serif" font-weight="800" font-size="44" letter-spacing="-1" fill="#1c1510">i</text>
      <text x="22" y="38" font-family="'Syne',sans-serif" font-weight="800" font-size="44" letter-spacing="-1" fill="#ff5029">HYPE</text>
    </svg>
  </div>

  <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase;margin-left:auto">assets/logo/wordmark.svg</div>
</body>
</html>
