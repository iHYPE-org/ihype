<!-- @dsCard group="Website" viewport="700x420" name="Believers Leaderboard" subtitle="Early-believer ranking — animated bars + rank pulse" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg-base); color: var(--ink-1); font-family: var(--font-body); padding: 24px 28px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  h1 { font-family: var(--font-display); font-weight: 800; font-size: 1.3rem; letter-spacing: -.03em; }
  .sub { font-family: var(--font-mono); font-size: .62rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); }
  .you { display: flex; align-items: center; gap: 12px; background: rgba(255,80,41,.07); border: 1px solid rgba(255,80,41,.22); border-radius: 14px; padding: 12px 16px; margin: 14px 0; animation: pop .6s cubic-bezier(.34,1.56,.64,1) both .2s; }
  @keyframes pop { from { opacity: 0; transform: scale(.94); } }
  .you .rank { font-family: var(--font-display); font-weight: 800; font-size: 1.7rem; letter-spacing: -.03em; color: var(--accent); animation: pulse 2.4s infinite; }
  @keyframes pulse { 0%,100% { text-shadow: 0 0 0 rgba(255,80,41,0); } 50% { text-shadow: 0 0 18px rgba(255,80,41,.55); } }
  .row { display: flex; align-items: center; gap: 11px; padding: 8px 0; opacity: 0; animation: rise .55s cubic-bezier(.16,1,.3,1) forwards; }
  @keyframes rise { from { opacity: 0; transform: translateX(-14px); } to { opacity: 1; transform: none; } }
  .n { font-family: var(--font-mono); font-size: .7rem; color: var(--ink-3); width: 20px; }
  .av { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--c1), var(--c2)); display: grid; place-items: center; font-family: var(--font-display); font-weight: 800; font-size: .7rem; color: #fff; flex-shrink: 0; }
  .nm { font-weight: 700; font-size: .84rem; flex-shrink: 0; width: 90px; }
  .bar { flex: 1; height: 7px; border-radius: 999px; background: var(--bg-raised); overflow: hidden; }
  .bar div { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), #ff3e9a); transform-origin: left; animation: grow 1.2s cubic-bezier(.16,1,.3,1) both; }
  @keyframes grow { from { transform: scaleX(0); } }
  .h { font-family: var(--font-mono); font-size: .68rem; color: var(--ink-2); width: 48px; text-align: right; }
</style>
</head>
<body>
  <div class="head"><h1>Early Believers · Nyla</h1><span class="sub">Ranked by first hype</span></div>
  <div class="sub" style="margin-bottom:2px">The fans who called it before anyone else.</div>
  <div class="you">
    <span class="rank">#12</span>
    <div><div style="font-weight:700;font-size:.88rem">Your believer rank</div><div style="font-family:var(--font-mono);font-size:.66rem;color:var(--ink-3);margin-top:2px">Hyped Mar 4 · before 4,809 others 🔥</div></div>
  </div>
  <div class="row" style="animation-delay:.3s"><span class="n">1</span><div class="av" style="--c1:#ffb84a;--c2:#ff5029">J</div><span class="nm">@juniper</span><div class="bar"><div style="width:100%;animation-delay:.4s"></div></div><span class="h">2,412</span></div>
  <div class="row" style="animation-delay:.4s"><span class="n">2</span><div class="av" style="--c1:#b983ff;--c2:#ff3e9a">T</div><span class="nm">@theo</span><div class="bar"><div style="width:82%;animation-delay:.5s"></div></div><span class="h">1,977</span></div>
  <div class="row" style="animation-delay:.5s"><span class="n">3</span><div class="av" style="--c1:#22e5d4;--c2:#7fb3ff">M</div><span class="nm">@mars.fm</span><div class="bar"><div style="width:64%;animation-delay:.6s"></div></div><span class="h">1,540</span></div>
  <div class="row" style="animation-delay:.6s"><span class="n">4</span><div class="av" style="--c1:#ff3e9a;--c2:#ff5029">K</div><span class="nm">@kaya</span><div class="bar"><div style="width:41%;animation-delay:.7s"></div></div><span class="h">988</span></div>
</body>
</html>
