<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg-base); }
  .label { font-family: var(--font-mono); font-size: 9px; letter-spacing: .18em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 14px; }
  .row { display: flex; gap: 28px; flex-wrap: wrap; align-items: center; }
  .chip { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .14em; }
</style>
</head>
<body>
  <div class="label">JetBrains Mono · Eyebrows &amp; Meta</div>
  <div class="row">
    <div class="chip" style="font-size:10px;color:var(--role-venue);font-weight:600">TONIGHT · 9:00 PM · DOORS OPEN</div>
    <div class="chip" style="font-size:9px;color:var(--ink-3)">FROM · TONIGHT'S QUEUE</div>
    <div class="chip" style="font-size:10px;color:var(--accent);font-weight:600">● HYPE FIRES AT 3:38</div>
    <div class="chip" style="font-size:9px;color:var(--ink-3)">AT EMPTY BOTTLE</div>
    <div class="chip" style="font-size:9px;color:var(--role-fan)">ARTIST · VERIFIED</div>
    <div class="chip" style="font-size:12px;color:var(--ink-2)">1:32 — 2:08</div>
  </div>
</body>
</html>
