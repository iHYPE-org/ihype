<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iHYPE — You're offline</title>
<link rel="stylesheet" href="styles.css">
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body { background: var(--bg-base, #0a0805); color: var(--ink-1, #f0ebe5); font-family: var(--font-body, 'DM Sans', sans-serif); display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { max-width: 380px; text-align: center; }
  .logo { font-family: var(--font-display, 'Syne', sans-serif); font-weight: 800; font-size: 2.4rem; letter-spacing: -.04em; color: var(--accent, #ff5029); }
  .icon { font-size: 3rem; margin: 22px 0 14px; }
  h1 { font-family: var(--font-display, 'Syne', sans-serif); font-weight: 800; font-size: 1.6rem; letter-spacing: -.02em; }
  p { font-size: .96rem; line-height: 1.6; color: var(--ink-2, #9e9080); margin: 14px 0 28px; }
  .btn { background: var(--accent, #ff5029); color: #fff; border: none; border-radius: 999px; padding: 13px 28px; font-family: var(--font-display, 'Syne', sans-serif); font-weight: 800; font-size: .96rem; cursor: pointer; width: 100%; }
  .note { font-family: var(--font-mono, 'JetBrains Mono', monospace); font-size: .7rem; color: var(--ink-3, #5a5048); margin-top: 16px; letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">iHYPE</div>
    <div class="icon">📡</div>
    <h1>No connection</h1>
    <p>You're offline right now. Your tickets and crate are still saved locally — reconnect to sync with the live feed.</p>
    <button class="btn" onclick="location.reload()">Try again</button>
    <div class="note">Your data is safe on this device.</div>
  </div>
</body>
</html>
