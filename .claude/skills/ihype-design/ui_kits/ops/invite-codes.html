<!-- @dsCard group="Operations" viewport="1280x860" name="Invite Code Manager" subtitle="Issue · revoke · track beta invite codes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iHYPE Ops — Invite Codes</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg-base); color: var(--ink-1); font-family: var(--font-body); padding: 28px; }
  .wrap { max-width: 1000px; margin: 0 auto; }
  h1 { font-family: var(--font-display); font-weight: 800; font-size: 1.4rem; letter-spacing: -.03em; margin: 0 0 4px; }
  h1 .o { color: var(--accent); }
  .sub { font-family: var(--font-mono); font-size: .68rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-2); margin-bottom: 28px; }
  .topbar { display: flex; gap: 10px; margin-bottom: 22px; align-items: center; }
  .topbar input { flex: 1; max-width: 220px; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--line-2); background: var(--bg-raised); color: var(--ink); font-family: var(--font-mono); font-size: .86rem; outline: none; text-transform: uppercase; }
  .topbar input:focus { border-color: var(--accent); }
  select.f { padding: 10px 14px; border-radius: 10px; border: 1px solid var(--line-2); background: var(--bg-raised); color: var(--ink-2); font-family: var(--font-mono); font-size: .84rem; outline: none; cursor: pointer; }
  .btn { padding: 10px 18px; border-radius: 10px; border: none; font-family: var(--font-display); font-weight: 800; font-size: .86rem; cursor: pointer; transition: all .15s; }
  .btn-pri { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--bg-raised); color: var(--ink-2); border: 1px solid var(--line-2); }
  .btn:hover { opacity: .85; }
  table { width: 100%; border-collapse: collapse; }
  th { font-family: var(--font-mono); font-size: .66rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3); text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--line); }
  td { padding: 12px 14px; border-bottom: 1px solid var(--line-2); font-size: .9rem; }
  .pill { font-family: var(--font-mono); font-size: .66rem; padding: 3px 10px; border-radius: 999px; letter-spacing: .06em; display: inline-block; }
  .pill.active  { background: rgba(34,229,212,.12); color: #22e5d4; }
  .pill.used    { background: rgba(185,131,255,.12); color: #b983ff; }
  .pill.revoked { background: rgba(255,80,41,.12); color: var(--accent); }
  .code-val { font-family: var(--font-mono); font-size: .9rem; letter-spacing: .06em; color: var(--ink-1); }
  .action { font-family: var(--font-mono); font-size: .74rem; color: var(--accent); cursor: pointer; border: none; background: none; padding: 0; }
  .action:hover { text-decoration: underline; }
  .empty { text-align: center; padding: 40px; color: var(--ink-3); font-size: .9rem; }
  .stats { display: flex; gap: 14px; margin-bottom: 22px; }
  .stat { background: var(--bg-surface); border: 1px solid var(--line); border-radius: 12px; padding: 14px 18px; flex: 1; }
  .stat .n { font-family: var(--font-display); font-weight: 800; font-size: 1.8rem; letter-spacing: -.02em; }
  .stat .l { font-family: var(--font-mono); font-size: .64rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); margin-top: 5px; }
  .bulk-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .bulk-row label { font-family: var(--font-mono); font-size: .76rem; color: var(--ink-2); }
  input[type=number].sm { width: 64px; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--line-2); background: var(--bg-raised); color: var(--ink); font-family: var(--font-mono); font-size: .84rem; outline: none; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bg-raised); border: 1px solid var(--line-2); border-radius: 12px; padding: 12px 20px; font-family: var(--font-mono); font-size: .82rem; color: var(--ink-1); box-shadow: 0 8px 32px rgba(0,0,0,.5); display: none; z-index: 99; }
</style>
</head>
<body>
<div class="wrap">
  <a href="../../ui_kits/ops/index.html" style="font-family:var(--font-mono);font-size:.72rem;letter-spacing:.12em;color:var(--ink-3);text-decoration:none;display:inline-flex;align-items:center;gap:6px;margin-bottom:20px">← iH/OPS</a>
  <h1>iH<span class="o">·</span>OPS — Invite Codes</h1>
  <div class="sub">Create · track · revoke beta invite codes</div>

  <div class="stats" id="statsRow">
    <div class="stat"><div class="n" id="sTotal" style="color:var(--accent)">4</div><div class="l">Total codes</div></div>
    <div class="stat"><div class="n" id="sUsed" style="color:#b983ff">0</div><div class="l">Redeemed</div></div>
    <div class="stat"><div class="n" id="sActive" style="color:#22e5d4">4</div><div class="l">Active</div></div>
    <div class="stat"><div class="n" id="sRevoked" style="color:var(--ink-3)">0</div><div class="l">Revoked</div></div>
  </div>

  <div style="background:var(--bg-surface);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:20px">
    <div style="font-family:var(--font-mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px">Issue codes</div>
    <div class="bulk-row">
      <label>Count</label>
      <input type="number" class="sm" id="bulkCount" value="1" min="1" max="50">
      <label>For role</label>
      <select class="f" id="bulkRole">
        <option value="any">Any role</option>
        <option value="fan">Fan</option>
        <option value="artist">Artist</option>
        <option value="dj">DJ</option>
        <option value="venue">Venue</option>
      </select>
      <label>Note</label>
      <input id="bulkNote" placeholder="e.g. LA venue cohort" style="flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--line-2);background:var(--bg-raised);color:var(--ink);font-family:var(--font-body);font-size:.86rem;outline:none">
    </div>
    <div class="topbar" style="margin-bottom:0">
      <input id="customCode" placeholder="CUSTOM-CODE (optional)">
      <button class="btn btn-pri" onclick="issueCode()">Issue code(s)</button>
      <button class="btn btn-ghost" onclick="issueRandom(10)">Bulk random ×10</button>
      <button class="btn btn-ghost" onclick="copyAll()">Copy all active</button>
    </div>
  </div>

  <table>
    <thead><tr><th>Code</th><th>Role</th><th>Note</th><th>Created</th><th>Status</th><th></th></tr></thead>
    <tbody id="codeTable"></tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<script>
  const BUILT_IN = [
    { code:'IHYPE',    role:'any', note:'built-in demo',   created: Date.now()-86400000*30, status:'active' },
    { code:'HYPE2026', role:'any', note:'built-in',        created: Date.now()-86400000*30, status:'active' },
    { code:'BETA',     role:'any', note:'built-in',        created: Date.now()-86400000*30, status:'active' },
    { code:'LISTEN',   role:'any', note:'built-in',        created: Date.now()-86400000*30, status:'active' },
  ];
  const LS_KEY = 'ihype_ops_codes';
  function loadCodes() {
    try { return BUILT_IN.concat(JSON.parse(localStorage.getItem(LS_KEY)||'[]')); }
    catch { return BUILT_IN; }
  }
  function saveCodes(codes) {
    localStorage.setItem(LS_KEY, JSON.stringify(codes.filter(c => !BUILT_IN.find(b => b.code===c.code))));
  }
  function rand(n=8) { const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; return Array.from({length:n},()=>chars[Math.floor(Math.random()*chars.length)]).join(''); }
  function toast(msg) {
    const el=document.getElementById('toast');
    el.textContent=msg; el.style.display='block';
    setTimeout(()=>{ el.style.display='none'; },2000);
  }

  function render() {
    const codes = loadCodes();
    const tbody = document.getElementById('codeTable');
    const betaOk = localStorage.getItem('ihype_beta_ok');

    // Determine which codes are "used" from localStorage
    const used = new Set();
    if (betaOk) {
      try {
        const log = JSON.parse(localStorage.getItem('ihype_track_log')||'[]');
        log.filter(e=>e.event==='beta_gate_pass').forEach(e=>{ if(e.props?.code) used.add(e.props.code.toUpperCase()); });
      } catch {}
    }

    tbody.innerHTML = codes.length === 0
      ? '<tr><td colspan="6" class="empty">No codes yet</td></tr>'
      : codes.map(c => {
          const st = c.status==='revoked' ? 'revoked' : used.has(c.code) ? 'used' : 'active';
          const dateStr = new Date(c.created).toLocaleDateString();
          const revokeBtn = c.status!=='revoked' && !BUILT_IN.find(b=>b.code===c.code)
            ? '<button class="action" onclick="revokeCode(''+c.code+'')">Revoke</button>' : '';
          return '<tr><td><span class="code-val">'+c.code+'</span></td><td><span style="font-family:var(--font-mono);font-size:.8rem;color:var(--ink-3)">'+c.role+'</span></td><td><span style="font-size:.84rem;color:var(--ink-2)">'+c.note+'</span></td><td><span style="font-family:var(--font-mono);font-size:.78rem;color:var(--ink-3)">'+dateStr+'</span></td><td><span class="pill '+st+'">'+st+'</span></td><td>'+revokeBtn+'<button class="action" style="margin-left:8px;color:var(--ink-3)" onclick="copyCode(''+c.code+'')">Copy</button></td></tr>';
        }).join('');

    // Stats
    document.getElementById('sTotal').textContent  = codes.length;
    document.getElementById('sUsed').textContent   = codes.filter(c=>used.has(c.code)).length;
    document.getElementById('sActive').textContent = codes.filter(c=>c.status==='active').length;
    document.getElementById('sRevoked').textContent= codes.filter(c=>c.status==='revoked').length;
  }

  function issueCode() {
    const custom = document.getElementById('customCode').value.trim().toUpperCase();
    const count  = parseInt(document.getElementById('bulkCount').value)||1;
    const role   = document.getElementById('bulkRole').value;
    const note   = document.getElementById('bulkNote').value.trim()||'manual';
    const codes  = loadCodes().filter(c=>!BUILT_IN.find(b=>b.code===c.code));
    const toAdd  = custom ? [custom] : Array.from({length:count},()=>rand());
    toAdd.forEach(c=>{ if(!codes.find(x=>x.code===c)) codes.push({code:c,role,note,created:Date.now(),status:'active'}); });
    saveCodes(codes);
    document.getElementById('customCode').value='';
    render(); toast('Issued: '+toAdd.join(', '));
  }

  function issueRandom(n) {
    document.getElementById('bulkCount').value=n;
    issueCode();
  }

  function revokeCode(code) {
    const custom = loadCodes().filter(c=>!BUILT_IN.find(b=>b.code===c.code));
    const c = custom.find(x=>x.code===code);
    if (c) { c.status='revoked'; saveCodes(custom); render(); toast('Revoked: '+code); }
  }

  function copyCode(code) {
    navigator.clipboard?.writeText(code).then(()=>toast('Copied: '+code)).catch(()=>toast(code));
  }

  function copyAll() {
    const active = loadCodes().filter(c=>c.status==='active').map(c=>c.code).join('\n');
    navigator.clipboard?.writeText(active).then(()=>toast('Copied '+active.split('\n').length+' codes')).catch(()=>{});
  }

  render();
</script>
</body>
</html>
