<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>

  *{box-sizing:border-box;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;}

<body>
<div id="root"></div>
<script type="text/babel" data-filename="workbench.jsx">
const T = {
  bg:'#0a0805', bg2:'#100d09', bg3:'#1a1612', bg4:'#221c16',
  ink:'#f0ebe5', ink2:'#9e9080', ink3:'#5a5048', ink4:'#3a342e',
  line:'rgba(255,255,255,.06)', line2:'rgba(255,255,255,.14)',
  accent:'#ff5029', fan:'#b983ff', venue:'#22e5d4', dj:'#ff3e9a',
  warn:'#ffb84a', blue:'#7fb3ff',
  fd:"'Syne',sans-serif", fb:"'DM Sans',system-ui,sans-serif", fm:"'JetBrains Mono',monospace",
};

// ── Icons ────────────────────────────────────────────────────
const I = {
  bolt:   (s=14,c='currentColor')=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z" stroke={c} strokeWidth="1.6" strokeLinejoin="round"/></svg>,
  heart:  (s=14,c='currentColor')=><svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M12 21s-7-4.5-9.5-9.2C.8 8.2 3 4.5 6.5 4.5c2 0 3.5 1 5.5 3 2-2 3.5-3 5.5-3C21 4.5 23.2 8.2 21.5 11.8 19 16.5 12 21 12 21z"/></svg>,
  trend:  (s=14,c='currentColor')=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M3 17l6-6 4 4 8-9M17 6h4v4" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  cal:    (s=14,c='currentColor')=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke={c} strokeWidth="1.6"/><path d="M3 10h18M8 3v4M16 3v4" stroke={c} strokeWidth="1.6"/></svg>,
  vote:   (s=14,c='currentColor')=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M4 11l4 4 12-12" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M20 12v7a2 2 0 01-2 2H6a2 2 0 01-2-2V8" stroke={c} strokeWidth="1.6"/></svg>,
  gear:   (s=14,c='currentColor')=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke={c} strokeWidth="1.6"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3h0a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8v0a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z" stroke={c} strokeWidth="1.4"/></svg>,
  search: (s=14,c='currentColor')=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke={c} strokeWidth="1.6"/><path d="M20 20l-3.5-3.5" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
  pin:    (s=12,c='currentColor')=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M12 22s7-6.5 7-12a7 7 0 10-14 0c0 5.5 7 12 7 12z" stroke={c} strokeWidth="1.5"/><circle cx="12" cy="10" r="2.5" stroke={c} strokeWidth="1.5"/></svg>,
  arrow:  (s=12,c='currentColor',d='right')=>{ const r={right:0,down:90,left:180,up:270}[d]||0; return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" style={{transform:`rotate(${r}deg)`}}><path d="M5 12h14m-5-6l6 6-6 6" stroke={c} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>; },
};

const RAIL = [
  { k:'home',    label:'Home',    icon: s => I.bolt(s) },
  { k:'seeds',   label:'Seeds',   icon: s => I.heart(s) },
  { k:'charts',  label:'Charts',  icon: s => I.trend(s) },
  { k:'shows',   label:'Shows',   icon: s => I.cal(s) },
  { k:'govern',  label:'Govern',  icon: s => I.vote(s) },
  { k:'settings',label:'Settings',icon: s => I.gear(s) },
];

// ── Primitives ───────────────────────────────────────────────
function Eyebrow({ children, c = T.ink3 }) {
  return <div style={{ fontFamily:T.fm, fontSize:9, letterSpacing:'.18em', color:c, textTransform:'uppercase' }}>{children}</div>;
}
function StatCard({ label, value, detail, c = T.accent }) {
  return (
    <div style={{ padding:'14px 16px', border:`1px solid ${T.line}`, borderRadius:10, background:T.bg2 }}>
      <Eyebrow>{label}</Eyebrow>
      <div style={{ fontFamily:T.fd, fontWeight:800, fontSize:26, letterSpacing:'-.015em', marginTop:8, color:T.ink }}>{value}</div>
      {detail && <div style={{ fontFamily:T.fm, fontSize:10, color:c, marginTop:5, letterSpacing:'.04em' }}>{detail}</div>}
    </div>
  );
}
function Panel({ title, link, children, style: s }) {
  return (
    <section style={{ border:`1px solid ${T.line}`, borderRadius:10, background:T.bg2, overflow:'hidden', ...s }}>
      {title && (
        <div style={{ padding:'11px 16px', borderBottom:`1px solid ${T.line}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div style={{ fontFamily:T.fd, fontWeight:700, fontSize:13, letterSpacing:'-.005em', color:T.ink }}>{title}</div>
          {link && <div style={{ fontFamily:T.fm, fontSize:8, letterSpacing:'.14em', textTransform:'uppercase', color:T.ink3, cursor:'pointer' }}>{link}</div>}
        </div>
      )}
      {children}
    </section>
  );
}
function Sparkbar({ data, w=160, h=36, c=T.accent }) {
  const max = Math.max(...data, 1);
  return (
    <svg width={w} height={h} viewBox={`0 0 ${data.length*4} ${h}`} preserveAspectRatio="none" style={{display:'block'}}>
      {data.map((v,i) => { const bh = v/max*(h-4); return <rect key={i} x={i*4} y={h-bh} width={3} height={bh} fill={c} opacity={0.35 + v/max*0.65}/>; })}
    </svg>
  );
}
function Art({ c=T.accent, size=44, label }) {
  return (
    <div style={{ width:size, height:size, borderRadius:6, background:`linear-gradient(135deg,${c},${c}66 60%,${c}22)`, position:'relative', overflow:'hidden', flexShrink:0 }}>
      <div style={{ position:'absolute', inset:0, background:'radial-gradient(circle at 28% 22%,rgba(255,255,255,.2),transparent 60%)' }}/>
      {label && <div style={{ position:'absolute', bottom:4, left:4, fontFamily:T.fd, fontWeight:800, fontSize:size>60?14:9, color:'rgba(255,255,255,.85)', lineHeight:1 }}>{label}</div>}
    </div>
  );
}
function Btn({ children, accent=T.accent, ghost, sm, onClick }) {
  return <button onClick={onClick} style={{ padding:sm?'5px 10px':'8px 14px', background:ghost?'transparent':accent, color:ghost?T.ink:T.bg, border:ghost?`1px solid ${T.line2}`:'none', borderRadius:6, fontFamily:T.fm, fontSize:sm?9:11, fontWeight:600, letterSpacing:'.06em', display:'inline-flex', alignItems:'center', gap:6, cursor:'pointer', whiteSpace:'nowrap' }}>{children}</button>;
}

// ── Data ─────────────────────────────────────────────────────
const SPARK = [12,18,24,21,29,34,28,31,26,38,42,36,30,44,51,48,42,55,61,58,72,68,81,76,90,84,98,88,104,96];
const TRACKS = [
  { title:'Collision',    album:'Dusk EP',  hypes:9800, fire:'3:38', c:T.accent },
  { title:'Glass Hours',  album:'Dusk EP',  hypes:7230, fire:'1:52', c:T.fan },
  { title:'Mirror Mouth', album:'B-sides',  hypes:5410, fire:'2:14', c:T.venue },
  { title:'Soft Static',  album:'Dusk EP',  hypes:4120, fire:'4:01', c:T.dj },
  { title:'Low Season',   album:'Singles',  hypes:2880, fire:'0:44', c:T.warn },
];
const SHOWS = [
  { venue:'Empty Bottle',   city:'Chicago, IL', date:'Jun 27 · Fri', tickets:280, cap:300, rsvp:48 },
  { venue:'Thalia Hall',    city:'Chicago, IL', date:'Jul 5 · Sat',  tickets:190, cap:600, rsvp:102 },
  { venue:'Lincoln Hall',   city:'Chicago, IL', date:'Jul 17 · Thu', tickets:95,  cap:400, rsvp:61 },
  { venue:'Sleeping Village',city:'Chicago, IL',date:'Jul 30 · Wed', tickets:60,  cap:200, rsvp:29 },
];
const PROPOSALS = [
  { title:'Add "Low Season" to all June setlists',      votes:1420, need:1500, days:3, c:T.fan,      passed:false },
  { title:'Open sound check to RSVP fans at Thalia',   votes:892,  need:600,  days:1, c:T.venue,    passed:true  },
  { title:'Record live album at Sleeping Village',      votes:340,  need:1000, days:9, c:T.dj, passed:false },
];

// ── Screens ──────────────────────────────────────────────────
function HomeScreen() {
  return (
    <div style={{ padding:'20px 24px', overflowY:'auto', flex:1, display:'flex', flexDirection:'column', gap:16 }}>
      <div>
        <Eyebrow c={T.accent}>THIS WEEK</Eyebrow>
        <div style={{ fontFamily:T.fd, fontWeight:800, fontSize:20, letterSpacing:'-.02em', marginTop:5, color:T.ink }}>Your HYPE report</div>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10 }}>
        <StatCard label="Total hypes"      value="9.8k"  detail="↑ 12% vs last week" c={T.accent} />
        <StatCard label="Unique listeners" value="3.2k"  detail="↑ 8% vs last week"  c={T.venue}  />
        <StatCard label="Upcoming shows"   value="4"     detail="Next: Jun 27"        c={T.fan}    />
        <StatCard label="Avg hype / track" value="1.96k" detail="Collision leads"     c={T.warn}   />
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr', gap:10 }}>
        <Panel title="Hype activity · 30 days" link="Export CSV">
          <div style={{ padding:'14px 16px 10px' }}>
            <div style={{ width:'100%' }}>
              <svg width="100%" height={68} viewBox={`0 0 ${SPARK.length*4} 68`} preserveAspectRatio="none" style={{display:'block'}}>
                {SPARK.map((v,i)=>{ const max=104; const bh=v/max*64; return <rect key={i} x={i*4} y={68-bh} width={3} height={bh} fill={T.accent} opacity={0.3+v/max*0.7}/>; })}
              </svg>
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', marginTop:6 }}>
              <div style={{ fontFamily:T.fm, fontSize:8, color:T.ink3, letterSpacing:'.1em' }}>MAY 21</div>
              <div style={{ fontFamily:T.fm, fontSize:8, color:T.ink3, letterSpacing:'.1em' }}>JUN 19</div>
            </div>
          </div>
        </Panel>
        <Panel title="Top tracks" link="All tracks">
          {TRACKS.slice(0,4).map((t,i)=>(
            <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 14px', borderBottom:i<3?`1px solid ${T.line}`:'none' }}>
              <Art c={t.c} size={34} label={t.title[0]} />
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontFamily:T.fb, fontWeight:500, fontSize:12, color:T.ink, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{t.title}</div>
                <div style={{ fontFamily:T.fm, fontSize:8, color:t.c, letterSpacing:'.08em', marginTop:2 }}>● AT {t.fire}</div>
              </div>
              <div style={{ fontFamily:T.fd, fontWeight:800, fontSize:12, color:T.ink, flexShrink:0 }}>{(t.hypes/1000).toFixed(1)}k</div>
            </div>
          ))}
        </Panel>
      </div>
      <Panel title="Upcoming shows" link="Manage shows">
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)' }}>
          {SHOWS.map((s,i)=>{
            const pct = Math.round(s.tickets/s.cap*100);
            const near = pct >= 80;
            return (
              <div key={i} style={{ padding:'14px 16px', borderRight:i<3?`1px solid ${T.line}`:'none' }}>
                <Eyebrow c={near?T.warn:T.ink3}>{near?'NEAR CAPACITY':'UPCOMING'}</Eyebrow>
                <div style={{ fontFamily:T.fd, fontWeight:800, fontSize:14, color:T.ink, marginTop:5, letterSpacing:'-.01em' }}>{s.venue}</div>
                <div style={{ fontFamily:T.fb, fontSize:11, color:T.ink3, marginTop:2 }}>{s.date}</div>
                <div style={{ marginTop:10, display:'flex', gap:6, alignItems:'center' }}>
                  <div style={{ flex:1, height:3, borderRadius:9999, background:T.bg3, overflow:'hidden' }}>
                    <div style={{ width:`${pct}%`, height:'100%', background:near?T.warn:T.accent, borderRadius:9999 }} />
                  </div>
                  <div style={{ fontFamily:T.fm, fontSize:8, color:T.ink3, flexShrink:0 }}>{s.tickets}/{s.cap}</div>
                </div>
              </div>
            );
          })}
        </div>
      </Panel>
    </div>
  );
}

function SeedsScreen() {
  return (
    <div style={{ padding:'20px 24px', overflowY:'auto', flex:1, display:'flex', flexDirection:'column', gap:16 }}>
      <div>
        <Eyebrow c={T.fan}>TRACK ANALYTICS</Eyebrow>

      </div>
      <Panel title="Your tracks · ranked by HYPE">

            </div>

            </div>
          </div>
        ))}
      </Panel>
    </div>
  );
}

function ShowsScreen() {
  return (
    <div style={{ padding:'20px 24px', overflowY:'auto', flex:1, display:'flex', flexDirection:'column', gap:16 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>

          <Eyebrow c={T.venue}>LIVE DATES</Eyebrow>

              </div>
            </Panel>
          );
        })}

            <div style={{ width:32, fontFamily:T.fm, fontSize:8, textAlign:'right' }}>{t.up>0?<span style={{color:T.venue}}>▲{t.up}</span>:t.down>0?<span style={{color:'#ff4545'}}>▼{t.down}</span>:<span style={{color:T.ink4}}>—</span>}</div>
          </div>
        ))}
      </Panel>
    </div>
  );
}

function GovernScreen() {
  const [votes, setVotes] = React.useState({});
  const cast = (i, dir) => setVotes(v => ({...v, [i]: v[i]===dir ? null : dir}));
  return (
    <div style={{ padding:'20px 24px', overflowY:'auto', flex:1, display:'flex', flexDirection:'column', gap:16 }}>
      <div>
        <Eyebrow c={T.dj}>COMMUNITY GOVERNANCE</Eyebrow>
        <div style={{ fontFamily:T.fd, fontWeight:800, fontSize:20, letterSpacing:'-.02em', marginTop:5, color:T.ink }}>Govern · One member, one vote</div>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {PROPOSALS.map((p,i)=>(
          <Panel key={i}>
            <div style={{ padding:'16px' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:16, marginBottom:12 }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontFamily:T.fb, fontWeight:600, fontSize:14, color:T.ink }}>{p.title}</div>
                  <div style={{ fontFamily:T.fm, fontSize:8, color:p.passed?p.c:T.ink3, letterSpacing:'.12em', textTransform:'uppercase', marginTop:6 }}>
                    {p.passed?'● PASSED':'ACTIVE'} · {p.days}D LEFT
                  </div>
                </div>
                <div style={{ flexShrink:0, textAlign:'right' }}>
                  <div style={{ fontFamily:T.fd, fontWeight:800, fontSize:20, color:p.c }}>{(p.votes+(votes[i]==='yes'?1:0)).toLocaleString()}</div>
                  <div style={{ fontFamily:T.fm, fontSize:9, color:T.ink3, letterSpacing:'.06em' }}>/ {p.need.toLocaleString()} needed</div>
                </div>
              </div>
              <div style={{ height:3, borderRadius:9999, background:T.bg3, overflow:'hidden', marginBottom:12 }}>
                <div style={{ width:`${Math.min((p.votes+(votes[i]==='yes'?1:0))/p.need*100,100)}%`, height:'100%', background:p.c, borderRadius:9999, transition:'width 400ms ease' }} />
              </div>
              {!p.passed && (
                <div style={{ display:'flex', gap:8 }}>
                  <button onClick={()=>cast(i,'yes')} style={{ flex:1, height:32, borderRadius:8, background:votes[i]==='yes'?p.c:'transparent', color:votes[i]==='yes'?T.bg:T.ink3, border:`1px solid ${votes[i]==='yes'?p.c:T.line2}`, fontFamily:T.fm, fontSize:9, letterSpacing:'.1em', cursor:'pointer', transition:'all 120ms' }}>▲ YES</button>
                  <button onClick={()=>cast(i,'no')} style={{ flex:1, height:32, borderRadius:8, background:votes[i]==='no'?'#ff4545':'transparent', color:votes[i]==='no'?T.bg:T.ink3, border:`1px solid ${votes[i]==='no'?'#ff4545':T.line2}`, fontFamily:T.fm, fontSize:9, letterSpacing:'.1em', cursor:'pointer', transition:'all 120ms' }}>▼ NO</button>
                </div>
              )}
            </div>
          </Panel>
        ))}
      </div>
    </div>
  );
}

function SettingsScreen() {
  const [role, setRole] = React.useState('Artist');
  const roles = ['Artist','Venue','DJ'];
  return (
    <div style={{ padding:'20px 24px', overflowY:'auto', flex:1, display:'flex', flexDirection:'column', gap:16 }}>
      <div><Eyebrow c={T.ink3}>ACCOUNT</Eyebrow><div style={{ fontFamily:T.fd, fontWeight:800, fontSize:20, letterSpacing:'-.02em', marginTop:5 }}>Settings</div></div>
      <Panel>
        <div style={{ padding:'14px 16px', borderBottom:`1px solid ${T.line}` }}>
          <div style={{ fontFamily:T.fm, fontSize:9, letterSpacing:'.12em', color:T.ink3, textTransform:'uppercase', marginBottom:10 }}>Active role</div>
          <div style={{ display:'flex', gap:6 }}>{roles.map(r=>{ const c=r==='Artist'?T.accent:r==='Venue'?T.venue:T.dj; return <button key={r} onClick={()=>setRole(r)} style={{ padding:'6px 14px', borderRadius:99, background:role===r?c:'transparent', color:role===r?T.bg:T.ink3, border:`1px solid ${role===r?c:T.line2}`, fontFamily:T.fm, fontSize:9, letterSpacing:'.1em', cursor:'pointer', transition:'all 120ms' }}>{r}</button>; })}</div>
        </div>
        <div style={{ padding:'14px 16px', borderBottom:`1px solid ${T.line}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div><div style={{ fontSize:13, fontWeight:500 }}>Notifications</div><div style={{ fontFamily:T.fm, fontSize:9, color:T.ink3, marginTop:3 }}>HYPE fires, chart entries, show alerts</div></div>
          <div style={{ width:36, height:20, borderRadius:99, background:T.accent, position:'relative', cursor:'pointer', flexShrink:0 }}><div style={{ position:'absolute', right:3, top:2, width:16, height:16, borderRadius:50, background:T.ink }}></div></div>
        </div>
        <div style={{ padding:'14px 16px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div><div style={{ fontSize:13, fontWeight:500 }}>Governance vote visible</div><div style={{ fontFamily:T.fm, fontSize:9, color:T.ink3, marginTop:3 }}>Community can see how you voted</div></div>
          <div style={{ width:36, height:20, borderRadius:99, background:T.bg3, border:`1px solid ${T.line2}`, position:'relative', cursor:'pointer', flexShrink:0 }}><div style={{ position:'absolute', left:3, top:2, width:16, height:16, borderRadius:50, background:T.ink3 }}></div></div>
        </div>
      </Panel>
      <Panel>
        <div style={{ padding:'14px 16px' }}>
          <div style={{ fontFamily:T.fm, fontSize:9, letterSpacing:'.12em', color:T.ink3, textTransform:'uppercase', marginBottom:8 }}>Maya Reyes · iH/MR2026</div>
          <div style={{ display:'flex', gap:8 }}>
            <button style={{ padding:'7px 14px', borderRadius:8, background:'transparent', color:T.ink3, border:`1px solid ${T.line2}`, fontFamily:T.fm, fontSize:9, letterSpacing:'.1em', cursor:'pointer' }}>Sign out</button>
            <a href="../../index.html" style={{ padding:'7px 14px', borderRadius:8, background:T.bg3, color:T.ink, border:`1px solid ${T.line2}`, fontFamily:T.fm, fontSize:9, letterSpacing:'.1em', textDecoration:'none' }}>← DS Hub</a>
          </div>
        </div>
      </Panel>
    </div>
  );
}

// ── Shell ────────────────────────────────────────────────────
const ROLE = { label:'Artist', color:T.accent };
const USER = { name:'Maya Reyes' };

function useWidth() {
  const [w, setW] = React.useState(window.innerWidth);
  React.useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return w;
}

function App() {
  const [scr, setScr] = React.useState(()=>{ try{return localStorage.getItem('ihype-wb-scr')||'home';}catch{return 'home';} });
  const go = k => { setScr(k); try{localStorage.setItem('ihype-wb-scr',k);}catch{} };
  const w = useWidth();
  const mobile = w < 900;

  const SCREENS = { home:<HomeScreen/>, seeds:<SeedsScreen/>, charts:<ChartsScreen/>, shows:<ShowsScreen/>, govern:<GovernScreen/>, settings:<SettingsScreen/> };

  return (
    <div style={{ width:'100vw', height:'100vh', background:T.bg, display:'flex', flexDirection:'column', overflow:'hidden', fontFamily:T.fb, color:T.ink }}>

      {/* ── Top bar ── */}
      <div style={{ height:mobile?48:42, borderBottom:`1px solid ${T.line}`, background:T.bg2, display:'flex', alignItems:'center', padding:`0 ${mobile?14:16}px`, gap:mobile?8:12, flexShrink:0 }}>
        <div style={{ fontFamily:T.fd, fontWeight:800, letterSpacing:'-.02em', fontSize:mobile?18:16 }}>
          i<span style={{color:T.accent}}>HYPE</span>
        </div>
        <div style={{ fontFamily:T.fm, fontSize:9, letterSpacing:'.14em', padding:'3px 8px', border:`1px solid ${ROLE.color}40`, borderRadius:4, color:ROLE.color }}>
          {ROLE.label.toUpperCase()}
        </div>
        {!mobile && (
          <div style={{ flex:1, position:'relative' }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, height:26, padding:'0 12px', background:T.bg3, border:`1px solid ${T.line}`, borderRadius:6, fontFamily:T.fm, fontSize:11, color:T.ink3, maxWidth:320, margin:'0 auto' }}>
              {I.search(12, T.ink3)}&nbsp;Search artists, shows, venues
              <span style={{ marginLeft:'auto', fontSize:9, color:T.ink4 }}>⌘K</span>
            </div>
          </div>
        )}
        <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:8 }}>
          {!mobile && <a href="../ops/index.html" style={{ fontFamily:T.fm, fontSize:9, letterSpacing:'.12em', padding:'3px 8px', border:`1px solid ${T.venue}44`, borderRadius:4, color:T.venue, textDecoration:'none' }}>iH/OPS →</a>}
          <div style={{ width:26, height:26, borderRadius:99, background:ROLE.color, color:T.bg, fontFamily:T.fd, fontWeight:800, fontSize:10, display:'flex', alignItems:'center', justifyContent:'center' }}>
            {USER.name.split(' ').map(s=>s[0]).slice(0,2).join('')}
          </div>
        </div>
      </div>

      {/* DS hub back link */}
      <a href="../../index.html" style={{ position:'fixed', bottom:mobile?80:20, right:16, zIndex:9999, display:'flex', alignItems:'center', gap:6, height:30, padding:'0 10px', borderRadius:99, background:T.bg2, color:T.ink3, fontFamily:T.fm, fontSize:8, letterSpacing:'.1em', textTransform:'uppercase', border:`1px solid ${T.line2}`, textDecoration:'none' }}>← DS</a>

      {/* ── Body ── */}
      <div style={{ flex:1, display:'flex', minHeight:0 }}>

        {/* Desktop side rail */}
        {!mobile && (
          <div style={{ width:88, borderRight:`1px solid ${T.line}`, background:T.bg2, padding:'12px 0', display:'flex', flexDirection:'column', gap:1, flexShrink:0 }}>
            {RAIL.map(it=>(
              <div key={it.k} onClick={()=>go(it.k)} style={{ padding:'10px 6px', display:'flex', flexDirection:'column', alignItems:'center', gap:5, cursor:'pointer', color:it.k===scr?T.ink:T.ink3, background:it.k===scr?T.bg3:'transparent', borderLeft:it.k===scr?`2px solid ${ROLE.color}`:'2px solid transparent', transition:'color 100ms, background 100ms' }}>
                <div style={{ width:18, height:18, display:'flex', alignItems:'center', justifyContent:'center' }}>{it.icon(14)}</div>
                <div style={{ fontFamily:T.fm, fontSize:8, letterSpacing:'.12em', textTransform:'uppercase' }}>{it.label}</div>
              </div>
            ))}
          </div>
        )}

        {/* Content */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0, overflow:'hidden' }}>
          {mobile && (
            /* Mobile search bar */
            <div style={{ padding:'8px 14px', borderBottom:`1px solid ${T.line}`, background:T.bg2, flexShrink:0 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, height:32, padding:'0 12px', background:T.bg3, border:`1px solid ${T.line}`, borderRadius:8, fontFamily:T.fm, fontSize:12, color:T.ink3 }}>
                {I.search(13, T.ink3)}&nbsp;Search artists, shows, venues…
              </div>
            </div>
          )}
          {SCREENS[scr] || <HomeScreen/>}
        </div>
      </div>

      {/* ── Mobile bottom tab bar ── */}
      {mobile && (
        <div style={{ height:64, borderTop:`1px solid ${T.line}`, background:T.bg2, display:'flex', alignItems:'center', flexShrink:0 }}>
          {RAIL.map(it=>(
            <div key={it.k} onClick={()=>go(it.k)} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3, padding:'8px 0', cursor:'pointer', color:it.k===scr?ROLE.color:T.ink3, transition:'color 120ms' }}>
              <div style={{ width:22, height:22, display:'flex', alignItems:'center', justifyContent:'center' }}>{it.icon(it.k===scr?18:16)}</div>
              <div style={{ fontFamily:T.fm, fontSize:7, letterSpacing:'.1em', textTransform:'uppercase' }}>{it.label}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
