<style id="splash-css">
#splash{position:fixed;inset:0;background:#060504;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s ease}
#splash.hide{opacity:0;pointer-events:none}
#splash-logo{font-family:'Syne',sans-serif;font-weight:900;font-size:2.5rem;letter-spacing:-.04em;color:#f0ebe5;margin-bottom:18px}
#splash-bar{width:120px;height:3px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden}

<link rel="stylesheet" href="../../styles.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #060504; color: #f0ebe5; overflow: hidden; }
#ihype-app-root { height: 100vh; display: flex; flex-direction: column; }
/* Token aliases: fan-app JSX uses shorthand names */
:root {
  --bg: var(--bg-base, #0e0b09);
  --bg-2: var(--bg-surface, #1a1612);
  --bg-3: var(--bg-raised, #242018);
  --bg-4: var(--bg-overlay, #2e2820);
  --line: var(--border-default, rgba(255,255,255,.1));
  --line-2: var(--border-subtle, rgba(255,255,255,.06));
  --ink: var(--ink-1, #f0ebe5);
  --ink-2: var(--ink-2, rgba(240,235,229,.75));
  --ink-3: var(--ink-3, rgba(240,235,229,.45));
  --accent: var(--color-accent, #ff5029);
  --f-d: var(--font-display, 'Syne', sans-serif);
  --f-b: var(--font-body, 'DM Sans', sans-serif);
  --f-m: var(--font-mono, 'JetBrains Mono', monospace);
  --shadow: 0 8px 32px rgba(0,0,0,.4);
  --shadow-glow: 0 4px 20px rgba(255,80,41,.35);
}

/* Platform switcher */
#pbar {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; padding: 14px 0 10px; flex-shrink: 0; z-index: 10;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.pb { padding: 6px 18px; border-radius: 8px; cursor: pointer; font-size: .8rem; font-family: var(--f-m); letter-spacing: .03em; font-weight: 500; transition: all .15s; border: 1px solid rgba(255,255,255,.1); background: transparent; color: rgba(255,255,255,.45); }
.pb.on { background: rgba(255,80,41,.12); border-color: var(--accent); color: var(--accent); font-weight: 700; }

/* Stage */
#stage {
  flex: 1; min-height: 0; position: relative; overflow: hidden;
}
.frame-scaler {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(var(--frame-scale,1));
  transform-origin: center center;
}

/* Device frames */
.frame { position: relative; flex-shrink: 0; overflow: hidden; }

/* iOS */
.frame-ios {
  width: 393px; height: 852px; border-radius: 50px;
  background: var(--bg, #0e0b09);
  box-shadow: 0 0 0 8px #1c1c1c, 0 0 0 9.5px #2a2a2a, 0 50px 120px rgba(0,0,0,.9);
  border: 1px solid rgba(255,255,255,.1);
}
.frame-ios .di {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  width: 126px; height: 37px; background: #000; border-radius: 20px;
  z-index: 200; pointer-events: none;
}
.frame-ios .sbar {
  position: absolute; top: 0; left: 0; right: 0; height: 59px;
  display: flex; justify-content: space-between; align-items: flex-end;
  padding: 0 28px 10px; z-index: 100; pointer-events: none;
  font-family: -apple-system, 'SF Pro Text', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: -0.3px; color: var(--ink, #f0ebe5);
}
.frame-ios .app { position: absolute; top: 59px; left: 0; right: 0; bottom: 34px; overflow: hidden; }
.frame-ios .home { position: absolute; bottom: 0; left: 0; right: 0; height: 34px; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.frame-ios .home div { width: 134px; height: 5px; border-radius: 3px; background: rgba(255,255,255,.28); }
/* SF Pro on iOS */
.frame-ios .app { font-family: -apple-system, 'SF Pro Text', sans-serif; }

/* Android */
.frame-android {
  width: 393px; height: 852px; border-radius: 44px;
  background: var(--bg, #0e0b09);
  box-shadow: 0 0 0 8px #1e1e1e, 0 0 0 9.5px #303030, 0 50px 120px rgba(0,0,0,.9);
  border: 1px solid rgba(255,255,255,.07);
}
.frame-android .cam {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  width: 12px; height: 12px; border-radius: 50%; background: #1a1a1a;
  border: 1px solid #333; z-index: 200; pointer-events: none;
}
.frame-android .sbar {
  position: absolute; top: 0; left: 0; right: 0; height: 38px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 24px; z-index: 100; pointer-events: none;
  font-family: var(--f-b, 'DM Sans', sans-serif); font-size: 12px; font-weight: 500; color: var(--ink, #f0ebe5);
}
.frame-android .app { position: absolute; top: 38px; left: 0; right: 0; bottom: 28px; overflow: hidden; }
.frame-android .nav { position: absolute; bottom: 0; left: 0; right: 0; height: 28px; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.frame-android .app button { position: relative; overflow: hidden; }
.frame-android .app button::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,.18); border-radius:inherit; opacity:0; transition:opacity .3s; pointer-events:none; }
.frame-android .app button:active::after { opacity:1; transition:none; }
.frame-android .nav div { width: 120px; height: 4px; border-radius: 2px; background: rgba(255,255,255,.25); }

/* Mobile generic */
.frame-mobile {
  width: 375px; height: 812px; border-radius: 44px;
  background: var(--bg, #0e0b09);
  box-shadow: 0 0 0 6px #181818, 0 50px 120px rgba(0,0,0,.9);
  border: 1px solid rgba(255,255,255,.1);
}
.frame-mobile .sbar {
  position: absolute; top: 0; left: 0; right: 0; height: 44px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 24px; z-index: 100; pointer-events: none;
  font-family: var(--f-b, 'DM Sans', sans-serif); font-size: 14px; font-weight: 600; color: var(--ink, #f0ebe5);
}
.frame-mobile .app { position: absolute; top: 44px; left: 0; right: 0; bottom: 34px; overflow: hidden; }
.frame-mobile .home { position: absolute; bottom: 0; left: 0; right: 0; height: 34px; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.frame-mobile .home div { width: 120px; height: 4px; border-radius: 2px; background: rgba(255,255,255,.25); }

/* Desktop */
.frame-desktop {
  width: 1240px; height: 800px; border-radius: 12px; overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 25px 70px rgba(0,0,0,.75), 0 0 0 1px rgba(255,255,255,.07);
}
.frame-desktop .chrome {
  height: 40px; background: #2a2826; border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; padding: 0 16px; gap: 8px; flex-shrink: 0;
}
.frame-desktop .traffic { width: 12px; height: 12px; border-radius: 50%; }
.frame-desktop .urlbar {
  flex: 1; display: flex; justify-content: center;
}
.frame-desktop .urlbar div {
  display: flex; align-items: center; gap: 8px; padding: 4px 16px;
  border-radius: 7px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08);
  min-width: 260px;
}
.frame-desktop .app { flex: 1; overflow: hidden; position: relative; }
</style>
</head>
<body>
<div id="splash"><div id="splash-logo">iHYPE</div><div id="splash-bar"><div id="splash-fill"></div></div></div>
<div id="ihype-app-root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script defer src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="../../lib/db.js"></script>
<script src="../../lib/api.js"></script>
<script src="../../lib/hydrate.js"></script>
<script src="./data.js"></script>
<script>
  // Seed DB from mock data once ready
  document.addEventListener('DOMContentLoaded', () => {
    window.IHYPE_DB && window.IHYPE_DB.seedFromMockData().catch(() => {});
  });
</script>
<script type="text/babel" src="./Seeds.jsx"></script>
<script type="text/babel" src="./ListenTab.jsx"></script>
<script type="text/babel" src="./EventsTab.jsx"></script>
<script type="text/babel" src="./PagesTab.jsx"></script>
<script type="text/babel" src="./RadioShowCreator.jsx"></script>
<script type="text/babel" src="./MoreSheets.jsx"></script>
<script type="text/babel" src="./Sheets.jsx"></script>
<script type="text/babel" src="./Shell.jsx"></script>
<script type="text/babel">
const FRAME_DIMS = {
  ios:     { w: 393, h: 852 },
  android: { w: 393, h: 852 },
  mobile:  { w: 375, h: 812 },
  desktop: { w: 1240, h: 800 },
};

function calcScale(plat) {
  const stage = document.getElementById('stage');
  if (!stage) return;
  const { w, h } = FRAME_DIMS[plat] || { w: 393, h: 852 };
  const pad = 32;
  const scale = Math.min((stage.clientWidth - pad) / w, (stage.clientHeight - pad) / h, 1);
  document.documentElement.style.setProperty('--frame-scale', scale);
}

// SVG icons reused in status bars
const SigIcon = () => (
  <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor">
    <rect x="0" y="6" width="3" height="6" rx="1"/>
    <rect x="4.7" y="4" width="3" height="8" rx="1"/>
    <rect x="9.4" y="2" width="3" height="10" rx="1"/>
    <rect x="14.1" y="0" width="3" height="12" rx="1" opacity=".35"/>
  </svg>
);
const WifiIcon = () => (
  <svg width="16" height="12" viewBox="0 0 24 18" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
    <path d="M1.5 7a16 16 0 0 1 21 0M5.5 11a10 10 0 0 1 13 0M9.5 15a5 5 0 0 1 5 0M12 19h.01"/>
  </svg>
);
const BatIcon = () => (
  <svg width="26" height="13" viewBox="0 0 26 13">
    <rect x="0" y="1.5" width="22" height="10" rx="3" stroke="currentColor" strokeWidth="1.3" fill="none"/>
    <rect x="22.2" y="4" width="2.5" height="5" rx="1.2" fill="currentColor" opacity=".4"/>
    <rect x="1.5" y="3" width="17" height="7" rx="2" fill="currentColor"/>
  </svg>
);

// Device frame wrappers
function IOSFrame({ children }) {
  const [np, setNp] = React.useState(null);
  React.useEffect(() => {
    const t = setInterval(() => {
      const p = window.IHYPE_NOW_PLAYING;
      setNp(p && window.IHYPE_PLAYING ? p : null);
    }, 800);
    return () => clearInterval(t);
  }, []);
  return (
    <div className="frame frame-ios">
      <div className="di" style={{ display:'flex', alignItems:'center', justifyContent: np ? 'space-between' : 'center', padding: np ? '0 10px' : '0', transition:'all .3s', overflow:'hidden' }}>
        {np ? <>
          <span style={{ fontSize:9, color:'rgba(255,255,255,.7)', fontFamily:'-apple-system,sans-serif', letterSpacing:.2, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:'70%' }}>♪ {np.a}</span>
          <div style={{ display:'flex', alignItems:'center', gap:3 }}>
            {[0,1,2,3].map(i=><div key={i} style={{ width:2, borderRadius:1, background:np.tint||'#ff5029', height:4+Math.sin(Date.now()/200+i)*3, animation:`diBar .6s ease-in-out ${i*120}ms infinite alternate` }}/>)}
          </div>
          <style>{`@keyframes diBar{to{height:12px}}`}</style>
        </> : null}
      </div>
      <div className="sbar">
        <span>9:41</span>
        <div style={{display:'flex',gap:6,alignItems:'center'}}><SigIcon/><WifiIcon/><BatIcon/></div>
      </div>
      <div className="app">{children}</div>
      <div className="home"><div/></div>
    </div>
  );
}

function AndroidFrame({ children }) {
  return (
    <div className="frame frame-android">
      <div className="cam"/>
      <div className="sbar">
        <span>9:41</span>
        <div style={{display:'flex',gap:5,alignItems:'center'}}><SigIcon/><WifiIcon/><BatIcon/></div>
      </div>
      <div className="app">{children}</div>
      <div className="nav"><div/></div>
    </div>
  );
}

function MobileFrame({ children }) {
  return (
    <div className="frame frame-mobile">
      <div className="sbar">
        <span>9:41</span>
        <div style={{display:'flex',gap:5,alignItems:'center'}}><SigIcon/><BatIcon/></div>
      </div>
      <div className="app">{children}</div>
      <div className="home"><div/></div>
    </div>
  );
}

function DesktopFrame({ children }) {
  return (
    <div className="frame frame-desktop">
      <div className="chrome">
        {[['#ff5f57','#ff5f57'],['#febc2e','#febc2e'],['#28c840','#28c840']].map(([c], i) => (
          <div key={i} className="traffic" style={{background: c}}/>
        ))}
        <div className="urlbar">
          <div>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.3)" strokeWidth="2" strokeLinecap="round"><path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z"/><path d="M12 8v4l3 3"/></svg>
            <span style={{fontFamily:'var(--f-m)',fontSize:12,color:'rgba(255,255,255,.35)',letterSpacing:'.01em'}}>ihype.app</span>
          </div>
        </div>
      </div>
      <div className="app">{children}</div>
    </div>
  );
}

// Platform switcher + root app
function App() {
  const [plat, setPlat] = React.useState(() => localStorage.getItem('ihype_platform') || 'ios');
  const update = p => { setPlat(p); localStorage.setItem('ihype_platform', p); requestAnimationFrame(() => calcScale(p)); };
  const PLATS = [['desktop','Desktop'],['mobile','Mobile'],['ios','iOS'],['android','Android']];

  React.useEffect(() => {
    calcScale(plat);
    const ro = new ResizeObserver(() => calcScale(plat));
    const stage = document.getElementById('stage');
    if (stage) ro.observe(stage);
    return () => ro.disconnect();
  }, [plat]);

  const Mobile = window.MobileShellV2;
  const Desktop = window.DesktopShell;

  const frames = {
    ios: ({ children }) => <IOSFrame>{children}</IOSFrame>,
    android: ({ children }) => <AndroidFrame>{children}</AndroidFrame>,
    mobile: ({ children }) => <MobileFrame>{children}</MobileFrame>,
    desktop: ({ children }) => <DesktopFrame>{children}</DesktopFrame>,
  };
  const Frame = frames[plat];

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#060504'}}>
      <div id="pbar">
        {PLATS.map(([id, label]) => (
          <button key={id} className={'pb' + (plat === id ? ' on' : '')} onClick={() => update(id)}>{label}</button>
        ))}
      </div>
      <div id="stage">
        {Frame && (
          <div className="frame-scaler">
            <Frame>
              {plat === 'desktop' ? (Desktop && <Desktop/>) : (Mobile && <Mobile/>)}
            </Frame>
          </div>
        )}
      </div>
    </div>
  );
}

if (!window.__ihype_root) window.__ihype_root = ReactDOM.createRoot(document.getElementById('ihype-app-root'));
window.__ihype_root.render(<App/>);
// Re-render when the hydration layer pulls live data (REAL mode)
window.addEventListener('ihype:data', () => window.__ihype_root.render(<App/>));
// Hide splash
const _sp = document.getElementById('splash');
if (_sp) { _sp.classList.add('hide'); setTimeout(() => _sp.remove(), 500); }
</script>
</body>
</html>
