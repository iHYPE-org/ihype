<!-- @dsCard group="Beta" viewport="1280x860" name="Live Demo Walkthrough" subtitle="Guided auto-advancing tour of the fan app" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iHYPE — Live Demo Walkthrough</title>
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #060504; color: var(--ink-1); font-family: var(--font-body); overflow: hidden; }
  #wrap { height: 100vh; display: flex; }

  /* ── narration rail ── */
  #rail { width: 376px; flex: none; background: linear-gradient(180deg,#120d09,#0a0805); border-right: 1px solid var(--line); display: flex; flex-direction: column; padding: 30px 28px; }
  .wm { font-family: var(--font-display); font-weight: 800; font-size: 1.5rem; letter-spacing: -.03em; color: var(--accent); }
  .kick { font-family: var(--font-mono); font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-3); margin-top: 4px; }

  /* step list */
  #steplist { margin: 26px 0 18px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
  .si { display: flex; align-items: center; gap: 12px; padding: 8px 10px; border-radius: 10px; cursor: pointer; transition: background .15s; }
  .si:hover { background: rgba(255,255,255,.03); }
  .si .dot { width: 24px; height: 24px; flex: none; border-radius: 50%; border: 1px solid var(--line-2); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: .72rem; color: var(--ink-3); }
  .si .t { font-size: .92rem; color: var(--ink-3); }
  .si.on { background: rgba(255,80,41,.1); }
  .si.on .dot { border-color: var(--accent); color: var(--accent); }
  .si.on .t { color: var(--ink-1); font-weight: 600; }
  .si.done .dot { background: var(--accent); border-color: var(--accent); color: #fff; }
  .si.done .t { color: var(--ink-2); }

  /* narration card */
  .ncard { margin-top: auto; }
  #ntitle { font-family: var(--font-display); font-weight: 800; font-size: 1.7rem; letter-spacing: -.02em; line-height: 1.12; }
  #nbody { font-size: .96rem; line-height: 1.6; color: var(--ink-2); margin-top: 12px; min-height: 4.6em; }

  .prog { height: 4px; background: var(--bg-raised); border-radius: 999px; overflow: hidden; margin: 20px 0 16px; }
  #progfill { height: 100%; width: 0; background: var(--accent); border-radius: 999px; }
  .ctrls { display: flex; gap: 10px; align-items: center; }
  #count { font-family: var(--font-mono); font-size: .72rem; color: var(--ink-3); letter-spacing: .08em; }
  .sp { flex: 1; }
  .btn { border: 1px solid var(--line-2); background: var(--bg-surface); color: var(--ink-1); border-radius: 10px; cursor: pointer; transition: all .15s; font-family: var(--font-display); font-weight: 700; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  #pause { width: 42px; height: 42px; font-size: .9rem; }
  #next { padding: 0 20px; height: 42px; font-size: .9rem; background: var(--accent); color: #fff; border-color: var(--accent); }
  #next:hover { color: #fff; opacity: .92; }

  /* ── stage ── */
  #stage { flex: 1; min-width: 0; position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 50% 25%,#15100c,#060504 70%); }
  .badge { position: absolute; top: 22px; right: 24px; font-family: var(--font-mono); font-size: .6rem; letter-spacing: .14em; text-transform: uppercase; color: var(--warn); border: 1px solid rgba(255,184,74,.3); background: rgba(255,184,74,.08); border-radius: 999px; padding: 5px 13px; }
  .device { position: relative; width: 393px; height: 820px; border-radius: 50px; background: #0e0b09; box-shadow: 0 0 0 8px #1c1c1c,0 0 0 9.5px #2a2a2a,0 50px 120px rgba(0,0,0,.9); transform: scale(.84); }
  #appframe { position: absolute; inset: 8px; width: calc(100% - 16px); height: calc(100% - 16px); border: 0; border-radius: 42px; background: #0a0805; }
</style>
</head>
<body>
<div id="wrap">
  <div id="rail">
    <div class="wm">iH·YPE</div>
    <div class="kick">Guided Demo · Beta</div>
    <div id="steplist"></div>
    <div class="ncard">
      <div id="ntitle">Loading…</div>
      <div id="nbody"></div>
      <div class="prog"><div id="progfill"></div></div>
      <div class="ctrls">
        <span id="count">0 / 0</span>
        <span class="sp"></span>
        <button class="btn" id="pause">❚❚</button>
        <button class="btn" id="next">Start →</button>
      </div>
    </div>
  </div>
  <div id="stage">
    <div class="badge">Live app · simulated</div>
    <div class="device"><iframe id="appframe" src="../ui_kits/fan-app/index.html" title="iHYPE fan app"></iframe></div>
  </div>
</div>
<script src="demo-walkthrough.js"></script>
</body>
</html>
