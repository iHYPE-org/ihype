name = "ihype"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
run_worker_first = true

[vars]
NEXT_PUBLIC_BASE_URL = "https://ihype.org"
NEXT_PUBLIC_APP_URL = "https://ihype.org"
NEXT_PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAADSF8WNxaeBIRmR7"
AUTH_URL = "https://ihype.org"
AUTH_TRUST_HOST = "true"

# Runtime secrets — set once with: wrangler secret put <NAME>
# Required:
#   DATABASE_URL          Neon postgres connection string
#   AUTH_SECRET           NextAuth signing secret
#   RESEND_API_KEY        Email sending
#   STRIPE_SECRET_KEY     Payments
#   STRIPE_WEBHOOK_SECRET Stripe webhook verification
#   MUX_TOKEN_ID          Mux API
#   MUX_TOKEN_SECRET
#   MUX_SIGNING_KEY_ID
#   MUX_SIGNING_PRIVATE_KEY
#   MUX_WEBHOOK_SECRET
#   VAPID_PRIVATE_KEY     Web push notifications
#   VAPID_PUBLIC_KEY
#   VAPID_SUBJECT

[[kv_namespaces]]
binding = "KV"
id = "b6330641874a4420b240d3a82760a9aa"
preview_id = "eb2e8a134c184a13a71710ec0287b958"

[[r2_buckets]]
binding = "R2"
bucket_name = "ihype-media"
preview_bucket_name = "ihype-media-preview"

[[d1_databases]]
binding = "D1"
database_name = "ihype-cron"
database_id = "72feb348-a07a-4bd5-a6ee-5b27b751999d"

[[analytics_engine_datasets]]
binding = "AE"
dataset = "ihype_analytics"

[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "ihype-email-queue"
