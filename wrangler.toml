name = "ihype"
main = "worker.js"
compatibility_date = "2026-05-29"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public", "no_handle_cross_request_promise_resolution"]
find_additional_modules = true
base_dir = ".open-next/server-functions/default"
# Production routes for ihype.org and www.ihype.org are managed in the Cloudflare dashboard.
workers_dev = false

# bcryptjs with 10 salt rounds needs ~200ms CPU; raise the limit so auth routes don't hit the 30ms default.
[limits]
cpu_ms = 1500

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true

rules = [
  { type = "CompiledWasm", globs = ["**/*.wasm"], fallthrough = true }
]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
AUTH_TRUST_HOST = "true"
AUTH_URL = "https://ihype.org"
NEXT_PUBLIC_APP_URL = "https://ihype.org"
NEXT_PUBLIC_BASE_URL = "https://ihype.org"
R2_PUBLIC_BASE_URL = "https://ihype.org"
NEXT_PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAADSF8WNxaeBIRmR7"
# Paid ticketing must remain an explicit configuration change, not dashboard residue.
FEATURE_ENABLE_TICKET_PAYMENTS = "false"

[[kv_namespaces]]
binding = "KV"
id = "b6330641874a4420b240d3a82760a9aa"
preview_id = "eb2e8a134c184a13a71710ec0287b958"

[[r2_buckets]]
binding = "R2"
bucket_name = "ihype-media"
preview_bucket_name = "ihype-media-preview"

# Pooled Postgres access — read by src/lib/db.ts, which falls back to
# DATABASE_URL when the binding is absent (local dev, build, scripts).
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "03f39c51f80a45d3bb6792a9676e292e"

# Atomic rate-limit counters — class defined in worker.js, consumed by
# src/lib/rate-limit.ts (falls back to KV when the binding is absent).
[[durable_objects.bindings]]
name = "RATE_LIMITER_DO"
class_name = "RateLimiterDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiterDO"]

[[analytics_engine_datasets]]
binding = "AE"
dataset = "ihype_analytics"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "ihype"

[ai]
binding = "AI"

[build]
command = "npm run cf:build"
