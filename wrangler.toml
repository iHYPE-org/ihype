name = "ihype"
main = "worker.js"
compatibility_date = "2026-05-20"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public", "no_handle_cross_request_promise_resolution"]
find_additional_modules = true
base_dir = ".open-next/server-functions/default"
# Production routes for ihype.org and www.ihype.org are managed in the Cloudflare dashboard.
workers_dev = false

# bcryptjs with 8 salt rounds needs ~50ms CPU; raise the limit so auth routes don't hit the 30ms default.
[limits]
cpu_ms = 300

rules = [
  { type = "CompiledWasm", globs = ["**/*.wasm"], fallthrough = true }
]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
AUTH_TRUST_HOST = "true"
AUTH_URL = "https://ihype.org"
NEXT_PUBLIC_APP_URL = "https://ihype.org"
NEXT_PUBLIC_BASE_URL = "https://ihype.org"
R2_PUBLIC_BASE_URL = "https://ihype.org"
NEXT_PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAADSF8WNxaeBIRmR7"

[[kv_namespaces]]
binding = "KV"
id = "b6330641874a4420b240d3a82760a9aa"
preview_id = "eb2e8a134c184a13a71710ec0287b958"

[[r2_buckets]]
binding = "R2"
bucket_name = "ihype-media"
preview_bucket_name = "ihype-media-preview"

[[d1_databases]]
binding = "D1"
database_name = "ihype-cron"
database_id = "72feb348-a07a-4bd5-a6ee-5b27b751999d"

[[analytics_engine_datasets]]
binding = "AE"
dataset = "ihype_analytics"

[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "ihype-email-queue"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "ihype"

[build]
command = "npm run cf:build"
