name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Typecheck, lint, test, build, and browser smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ihype
          POSTGRES_PASSWORD: ihype
          POSTGRES_DB: ihype
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U ihype"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ihype:ihype@localhost:55432/ihype
      AUTH_SECRET: ci-only-auth-secret-change-me-0123456789
      NEXTAUTH_SECRET: ci-only-auth-secret-change-me-0123456789
      AUTH_TRUST_HOST: 'true'
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
      FEATURE_REQUIRE_INVITE_CODE: 'false'
      FEATURE_ENABLE_TICKET_PAYMENTS: 'false'

    steps:
      - uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f

      - uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Production dependency audit
        # Dev-only advisories (currently @opentelemetry/core, transitively
        # pinned by @sentry/nextjs and lighthouse) don't block merges — only
        # vulnerabilities reachable from what actually ships to production do.
        run: npm audit --omit=dev --audit-level=high

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error

      - name: Source policy lint
        run: npm run lint

      - name: Design guard
        run: npm run guard:design

      - name: Unit tests
        run: npm test

      - name: Prepare scratch database
        run: |
          psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS pg_trgm; CREATE EXTENSION IF NOT EXISTS citext;'
          npx prisma db push --accept-data-loss

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Mandatory public browser smoke
        run: npx playwright test e2e/public-smoke.spec.ts --project=chromium

      - name: Extended authenticated E2E suite
        if: vars.E2E_ENABLED == 'true'
        run: npm run test:e2e -- --project=chromium
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_OTP: ${{ secrets.TEST_USER_OTP }}
          TEST_SESSION_COOKIE: ${{ secrets.TEST_SESSION_COOKIE }}

      - name: Cloudflare build
        run: npm run cf:build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXT_PUBLIC_BASE_URL: https://ihype.org
          NEXT_PUBLIC_APP_URL: https://ihype.org
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "0x4AAAAAADSF8WNxaeBIRmR7"

      - name: Mandatory authenticated Workerd security smoke + performance budget
        timeout-minutes: 20
        run: |
          set -o pipefail
          node scripts/workerd-smoke.mjs 2>&1 | tee workerd-smoke.log
        env:
          DATABASE_URL: postgresql://ihype:ihype@localhost:55432/ihype
          WORKERD_SMOKE_DATABASE_URL: postgresql://ihype:ihype@localhost:55432/ihype
          WORKERD_SMOKE_CRON_SECRET: ci-only-workerd-health-secret-0123456789
          AUTH_SECRET: ci-only-auth-secret-change-me-0123456789
          NEXTAUTH_SECRET: ci-only-auth-secret-change-me-0123456789

      - name: Upload Workerd diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: workerd-smoke-diagnostics
          path: workerd-smoke.log
          if-no-files-found: ignore

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: lighthouse-budget-report
          path: lighthouse-budget-report.json
          if-no-files-found: ignore
