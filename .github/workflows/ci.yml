name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Typecheck and test
    runs-on: ubuntu-latest
    services:
      # Scratch Postgres for the workerd smoke stage below.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ihype
          POSTGRES_PASSWORD: ihype
          POSTGRES_DB: ihype
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U ihype"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Design guard
        run: npm run guard:design

      - name: Test
        run: npm test

      - name: Install Playwright browsers
        if: vars.E2E_ENABLED == 'true'
        run: npx playwright install chromium --with-deps

      - name: E2E smoke test
        if: vars.E2E_ENABLED == 'true'
        run: npm run test:e2e
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: https://ihype.org
          NEXT_PUBLIC_APP_URL: https://ihype.org
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_OTP: ${{ secrets.TEST_USER_OTP }}

      - name: Cloudflare build
        run: npm run cf:build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXT_PUBLIC_BASE_URL: https://ihype.org
          NEXT_PUBLIC_APP_URL: https://ihype.org
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "0x4AAAAAADSF8WNxaeBIRmR7"

      # Boot the built worker in the REAL Workers runtime (workerd via
      # wrangler dev) against the scratch Postgres and exercise the code
      # paths that only break on workerd — Prisma engine selection passed
      # every Node-based check while production auth was down for a day
      # (DESIGN_SYNC rows 171-176). This is the only pre-deploy gate that
      # can catch that class of failure; the post-deploy production smoke
      # is currently blind (Cloudflare edge 403s GitHub runners).
      - name: Workerd smoke (real Workers runtime)
        run: |
          psql "$WORKERD_SMOKE_DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS pg_trgm; CREATE EXTENSION IF NOT EXISTS citext;'
          npx prisma db push --skip-generate --accept-data-loss
          node scripts/workerd-smoke.mjs
        env:
          DATABASE_URL: postgresql://ihype:ihype@localhost:55432/ihype
          WORKERD_SMOKE_DATABASE_URL: postgresql://ihype:ihype@localhost:55432/ihype

      # Perceived speed on the free public pages (marketing, discovery,
      # sign-in) is a conversion lever for a new visitor deciding whether to
      # create an account — this catches a regression before it ships.
      # Reuses the schema already pushed for the workerd smoke above.
      # ubuntu-latest ships google-chrome-stable; chrome-launcher finds it
      # without any extra install step.
      - name: Performance budget (Lighthouse)
        run: |
          npm run build
          npm run start -- -p 3100 &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://localhost:3100/ && break
            sleep 1
          done
          node scripts/lighthouse-budget.mjs
        env:
          DATABASE_URL: postgresql://ihype:ihype@localhost:55432/ihype
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          AUTH_TRUST_HOST: 'true'
          NEXTAUTH_URL: http://localhost:3100
          NEXT_PUBLIC_BASE_URL: http://localhost:3100
          NEXT_PUBLIC_APP_URL: http://localhost:3100
          LHCI_BASE_URL: http://localhost:3100

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-budget-report
          path: lighthouse-budget-report.json
          if-no-files-found: ignore
