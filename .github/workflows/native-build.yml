name: Native shell build (iOS + Android)

# iHYPE ships as a Capacitor shell around the live site (capacitor.config.ts
# points server.url at production), so this workflow only needs to run when
# the native shell itself changes — icons, splash, native config, plugins.
# Regular feature/content work ships through deploy-production.yml and
# reaches every platform immediately with no rebuild here.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'ios/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'capacitor-shell/**'
      - 'package.json'
  push:
    branches:
      - main
    paths:
      - 'ios/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'capacitor-shell/**'
      - 'package.json'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # Debug/simulator builds need no signing, so this runs unconditionally as
  # a real "does the native shell still compile" check on every change.
  ios-debug-build:
    name: iOS — debug build (unsigned)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync ios

      # Capacitor 8's iOS template uses a local Swift Package (CapApp-SPM)
      # for plugin dependencies instead of CocoaPods, so there's no Podfile
      # and no .xcworkspace — xcodebuild resolves the local package itself.
      - name: Build for iOS Simulator (no signing required)
        working-directory: ios/App
        run: |
          xcodebuild -project App.xcodeproj -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug build CODE_SIGNING_ALLOWED=NO

  android-debug-build:
    name: Android — debug build (unsigned)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

  # Signed release builds need an Apple Developer Program account and a
  # Google Play Console account. The steps below are real — not placeholders
  # — but have never run against a real account/credential set (neither
  # existed at the time this was written), so double-check the exact secret
  # names/formats against each console's current UI before the first real run.
  # Both jobs skip with a clear message until their secrets exist, matching
  # the pattern in deploy-production.yml.
  ios-release-build:
    name: iOS — signed release build
    runs-on: macos-15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      # Required secrets:
      #   IOS_DIST_CERTIFICATE_BASE64      - `base64 -i Distribution.p12` of the
      #                                       Apple Distribution certificate + key
      #   IOS_DIST_CERTIFICATE_PASSWORD    - the .p12 export password
      #   IOS_PROVISIONING_PROFILE_BASE64  - `base64 -i profile.mobileprovision`,
      #                                       an App Store profile for com.ihype.app
      #   IOS_TEAM_ID                      - Apple Developer Team ID (App Store
      #                                       Connect → Membership)
      #   APP_STORE_CONNECT_KEY_ID         - App Store Connect API key ID
      #   APP_STORE_CONNECT_ISSUER_ID      - App Store Connect API issuer ID
      #   APP_STORE_CONNECT_API_KEY_BASE64 - `base64 -i AuthKey_<KEY_ID>.p8`
      # (Users and Access → Integrations → App Store Connect API, in App
      # Store Connect — create a key with the App Manager role.)
      - name: Check for signing secrets
        id: check
        run: |
          if [ -n "${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}" ] && \
             [ -n "${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}" ] && \
             [ -n "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" ] && \
             [ -n "${{ secrets.IOS_TEAM_ID }}" ] && \
             [ -n "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" ] && \
             [ -n "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" ] && \
             [ -n "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::iOS release signing secrets not fully configured yet — skipping signed build. Needs an Apple Developer Program account, a distribution certificate + provisioning profile for com.ihype.app, and an App Store Connect API key."
          fi

      - name: Install dependencies
        if: steps.check.outputs.configured == 'true'
        run: npm ci

      - name: Sync Capacitor
        if: steps.check.outputs.configured == 'true'
        run: npx cap sync ios

      # Imports the distribution cert + provisioning profile into a
      # throwaway keychain scoped to this job only (the runner VM is
      # destroyed after the job, so a random password is fine — nothing
      # persists it).
      - name: Import signing certificate and provisioning profile
        if: steps.check.outputs.configured == 'true'
        env:
          IOS_DIST_CERTIFICATE_BASE64: ${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}
          IOS_DIST_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/dist_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo -n "$IOS_DIST_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_DIST_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" "$(security list-keychains -d user | sed 's/"//g' | tr -d '\n ')"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/"Provisioning Profiles"
          cp "$PROFILE_PATH" ~/Library/MobileDevice/"Provisioning Profiles"/ihype-appstore.mobileprovision

          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

      - name: Archive
        if: steps.check.outputs.configured == 'true'
        working-directory: ios/App
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          xcodebuild -project App.xcodeproj -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            archive

      - name: Export .ipa
        if: steps.check.outputs.configured == 'true'
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$IOS_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.ihype.app</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload to TestFlight
        if: steps.check.outputs.configured == 'true'
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            -o ~/private_keys/AuthKey_"$APP_STORE_CONNECT_KEY_ID".p8

          IPA_PATH=$(find "$RUNNER_TEMP/export" -maxdepth 1 -name '*.ipa' | head -n1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No .ipa found in export directory"
            exit 1
          fi

          xcrun altool --upload-app \
            -f "$IPA_PATH" -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

  android-release-build:
    name: Android — signed release build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # Required secrets:
      #   ANDROID_KEYSTORE_BASE64          - `base64 -i upload-keystore.jks` of
      #                                       the Play Console upload keystore
      #   ANDROID_KEYSTORE_PASSWORD        - keystore password
      #   ANDROID_KEY_ALIAS                - key alias within the keystore
      #   ANDROID_KEY_PASSWORD             - that key's password (often the
      #                                       same as the keystore password)
      #   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON - a Play Console service-account
      #                                       JSON key with Release Manager
      #                                       access (Play Console → Users and
      #                                       permissions → API access)
      - name: Check for signing secrets
        id: check
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && \
             [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] && \
             [ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ] && \
             [ -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ] && \
             [ -n "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Android release signing secrets not fully configured yet — skipping signed build. Needs a Google Play Console account, an upload keystore for com.ihype.app, and a Play Console API service account."
          fi

      - name: Install dependencies
        if: steps.check.outputs.configured == 'true'
        run: npm ci

      - name: Sync Capacitor
        if: steps.check.outputs.configured == 'true'
        run: npx cap sync android

      - name: Decode keystore
        if: steps.check.outputs.configured == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      # Signing properties are passed on the command line (Android Gradle
      # Plugin's built-in android.injected.signing.* mechanism) rather than
      # committing a signingConfig to build.gradle, so no keystore path or
      # password ever needs to exist in the repo itself.
      - name: Build signed release bundle
        if: steps.check.outputs.configured == 'true'
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.keystore" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Upload to Play Console
        if: steps.check.outputs.configured == 'true'
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.ihype.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
