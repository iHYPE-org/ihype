name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: |
          for i in 1 2 3; do
            npx prisma migrate deploy && exit 0
            echo "Migration attempt $i failed, retrying in 15s..."
            sleep 15
          done
          exit 1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Build for Cloudflare
        run: npm run cf:build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: https://ihype.org
          NEXT_PUBLIC_APP_URL: https://ihype.org

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy

      - name: Deploy cron Worker
        run: npx wrangler deploy --config wrangler.cron.toml
