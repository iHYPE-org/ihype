name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

concurrency:
  group: production-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: Production – ihype
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test

      - name: Run migrations
        run: |
          STATUS=$(npx prisma migrate status 2>&1)
          echo "$STATUS"
          if echo "$STATUS" | grep -qE "unapplied migration|not yet been applied"; then
            for i in 1 2 3; do
              npx prisma migrate deploy && exit 0
              echo "Migration attempt $i failed, retrying in 15s..."
              sleep 15
            done
            exit 1
          else
            echo "All migrations already applied; skipping migrate deploy."
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Deploy to Cloudflare Workers
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npx wrangler deploy worker.js --experimental-autoconfig=false
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: https://ihype.org
          NEXT_PUBLIC_APP_URL: https://ihype.org

      - name: Deploy cron Worker
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npx wrangler deploy --config wrangler.cron.toml

      - name: Smoke production
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npm run smoke:production
        env:
          SMOKE_BASE_URL: https://ihype.org
          SMOKE_BYPASS_TOKEN: ${{ secrets.SMOKE_BYPASS_TOKEN }}
          SMOKE_ALLOW_EDGE_BLOCK: '1'

      - name: Skip Cloudflare deploy notice
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: echo "Cloudflare deploy skipped because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not configured."
