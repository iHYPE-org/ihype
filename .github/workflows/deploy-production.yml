name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Wake up Neon database
        run: node -e "const { Client } = require('pg'); const c = new Client({ connectionString: process.env.DIRECT_URL, connectionTimeoutMillis: 30000 }); c.connect().then(() => c.query('SELECT 1')).then(() => { console.log('DB ready'); return c.end(); }).catch(e => { console.error('Wake-up failed:', e.message); process.exit(0); });"
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Resolve any failed migrations
        run: npx prisma migrate resolve --rolled-back 20260507000001_radio_track_block_label || true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run migrations
        run: |
          for i in 1 2 3; do
            npx prisma migrate deploy && exit 0
            echo "Migration attempt $i failed, retrying in 15s..."
            sleep 15
          done
          exit 1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Build for Cloudflare
        run: npm run cf:build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .open-next/assets --project-name=ihype --branch=main

      - name: Deploy cron Worker
        run: npx wrangler deploy --config wrangler.cron.toml
