name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

concurrency:
  group: production-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: Production – ihype
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Design guard
        run: npm run guard:design

      - name: Run tests
        run: npm test

      - name: Run migrations
        # Fail closed: `migrate deploy` is idempotent, so always run it and
        # block the deploy if it can't complete. The old grep on `migrate
        # status` output failed open — any status error (e.g. a missing env
        # var) read as "all migrations applied" and the deploy shipped against
        # a stale schema.
        run: |
          npx prisma migrate status || true
          for i in 1 2 3; do
            npx prisma migrate deploy && exit 0
            echo "Migration attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::prisma migrate deploy failed; blocking deploy."
          exit 1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # schema.prisma reads env("DIRECT_DATABASE_URL") — this was
          # previously exported as DIRECT_URL, which Prisma never saw.
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_URL }}

      - name: Build for Cloudflare Workers
        run: npm run cf:build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: https://ihype.org
          NEXT_PUBLIC_APP_URL: https://ihype.org
          # NEXT_PUBLIC_* vars are inlined into the client bundle at `next
          # build` time — wrangler.toml's [vars] only configures the deployed
          # Worker's runtime env and is never read by this build step, so the
          # Turnstile site key must also be passed here or the widget never
          # renders client-side (silently blocking every real registration).
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "0x4AAAAAADSF8WNxaeBIRmR7"

      - name: Diagnose Turnstile build output (temporary)
        run: |
          echo "Searching .open-next/assets for the inlined site key..."
          if grep -rl "0x4AAAAAADSF8WNxaeBIRmR7" .open-next/assets/_next/static/chunks/*.js 2>/dev/null; then
            echo "FOUND: site key literal is present in the built client bundle."
          else
            echo "NOT FOUND: site key literal is missing from the built client bundle."
          fi
          echo "Searching for the unresolved raw property-access pattern instead..."
          grep -rl "NEXT_PUBLIC_TURNSTILE_SITE_KEY" .open-next/assets/_next/static/chunks/*.js 2>/dev/null || echo "(no raw reference found either)"
          echo "next --version: $(npx next --version)"

      - name: Deploy to Cloudflare Workers
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npx wrangler deploy worker.js --autoconfig=false
        env:
          NEXT_PUBLIC_BASE_URL: https://ihype.org
          NEXT_PUBLIC_APP_URL: https://ihype.org

      - name: Deploy cron Worker
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npx wrangler deploy --config wrangler.cron.toml

      - name: Smoke production
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npm run smoke:production
        env:
          SMOKE_BASE_URL: https://ihype.org
          SMOKE_BYPASS_TOKEN: ${{ secrets.SMOKE_BYPASS_TOKEN }}
          SMOKE_ALLOW_EDGE_BLOCK: '1'

      - name: Purge Cloudflare cache
        if: env.CLOUDFLARE_CACHE_PURGE_TOKEN != '' && env.CLOUDFLARE_ZONE_ID != ''
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_CACHE_PURGE_TOKEN: ${{ secrets.CLOUDFLARE_CACHE_PURGE_TOKEN }}
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_CACHE_PURGE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | tee /tmp/purge-result.json
          if ! grep -q '"success":true' /tmp/purge-result.json; then
            echo "Cache purge failed:" && cat /tmp/purge-result.json && exit 1
          fi
          echo "Cache purged successfully."

      - name: Skip Cloudflare deploy notice
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: echo "Cloudflare deploy skipped because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not configured."
