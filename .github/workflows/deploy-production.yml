name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

concurrency:
  group: production-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: Production – ihype
    permissions:
      contents: read
      deployments: write
    services:
      # Local-only scratch DB for the pre-deploy Workerd smoke test below —
      # never touches the real production database.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ihype
          POSTGRES_PASSWORD: ihype
          POSTGRES_DB: ihype
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U ihype"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f

      - uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Source policy lint
        run: npm run lint

      - name: Design guard
        run: npm run guard:design

      - name: Run tests
        run: npm test

      - name: Build for Cloudflare Workers
        run: npm run cf:build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: https://ihype.org
          NEXT_PUBLIC_APP_URL: https://ihype.org
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "0x4AAAAAADSF8WNxaeBIRmR7"
          FEATURE_ENABLE_TICKET_PAYMENTS: 'true'

      # Safety net for the 2026-07-21 incident (see scripts/worker-size-budget.mjs):
      # this same check runs in ci.yml on every PR, but branch protection
      # doesn't yet block merges on that check passing, so this catches it
      # here too, before spending time on the smoke test/migrations that
      # would otherwise precede a doomed deploy.
      - name: Worker bundle size budget
        run: node scripts/worker-size-budget.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Prepare Workerd smoke scratch database
        run: |
          psql "postgresql://ihype:ihype@localhost:55432/ihype" -c 'CREATE EXTENSION IF NOT EXISTS pg_trgm; CREATE EXTENSION IF NOT EXISTS citext;'
          npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://ihype:ihype@localhost:55432/ihype

      - name: Pre-deploy Workerd smoke test
        # Boots the just-built worker.js under REAL workerd (wrangler dev) and
        # exercises it before touching production migrations or Cloudflare —
        # a build/typecheck/vitest pass proves nothing about workerd-only
        # crashes (2026-07-20: @sentry/nextjs's server init took production
        # down with an AsyncLocalStorage error that only ever surfaced here).
        # This is the same script ci.yml already runs on every PR — running
        # it again here means a deploy can't reach Cloudflare even if a PR
        # was merged before its own CI check finished (exactly what happened
        # that day). Runs against the local scratch DB above only; never
        # touches the real production database.
        timeout-minutes: 20
        run: |
          set -o pipefail
          SKIP_LIGHTHOUSE_BUDGET=1 node scripts/workerd-smoke.mjs 2>&1 | tee workerd-smoke.log
        env:
          DATABASE_URL: postgresql://ihype:ihype@localhost:55432/ihype
          WORKERD_SMOKE_DATABASE_URL: postgresql://ihype:ihype@localhost:55432/ihype
          WORKERD_SMOKE_CRON_SECRET: predeploy-workerd-health-secret-0123456789
          AUTH_SECRET: predeploy-only-auth-secret-change-me-0123456789
          NEXTAUTH_SECRET: predeploy-only-auth-secret-change-me-0123456789

      - name: Upload pre-deploy Workerd smoke diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: predeploy-workerd-smoke-log
          path: workerd-smoke.log
          if-no-files-found: ignore

      - name: Run migrations
        # Build (and now the Workerd smoke test above) run first so neither a
        # compilation failure nor a workerd-only crash can advance production
        # schema. Prisma reads DATABASE_URL, so supply the direct/non-pooled
        # secret under that exact name for migration commands.
        run: |
          for i in 1 2 3; do
            npx prisma migrate deploy && exit 0
            echo "Migration attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::prisma migrate deploy failed; blocking deploy."
          exit 1
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}

      - name: Deploy to Cloudflare Workers
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npx wrangler deploy worker.js --autoconfig=false
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: https://ihype.org
          NEXT_PUBLIC_APP_URL: https://ihype.org
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "0x4AAAAAADSF8WNxaeBIRmR7"
          FEATURE_ENABLE_TICKET_PAYMENTS: 'true'

      - name: Deploy cron Worker
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npx wrangler deploy --config wrangler.cron.toml

      - name: Smoke production
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npm run smoke:production
        env:
          SMOKE_BASE_URL: https://ihype.org
          SMOKE_BYPASS_TOKEN: ${{ secrets.SMOKE_BYPASS_TOKEN }}
          SMOKE_HEALTH_BEARER: ${{ secrets.CRON_SECRET }}
          SMOKE_ALLOW_EDGE_BLOCK: '1'

      - name: Purge Cloudflare cache
        if: env.CLOUDFLARE_CACHE_PURGE_TOKEN != '' && env.CLOUDFLARE_ZONE_ID != ''
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_CACHE_PURGE_TOKEN: ${{ secrets.CLOUDFLARE_CACHE_PURGE_TOKEN }}
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_CACHE_PURGE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | tee /tmp/purge-result.json
          if ! grep -q '"success":true' /tmp/purge-result.json; then
            echo "Cache purge failed:" && cat /tmp/purge-result.json && exit 1
          fi
          echo "Cache purged successfully."

      - name: Skip Cloudflare deploy notice
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: echo "Cloudflare deploy skipped because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not configured."
