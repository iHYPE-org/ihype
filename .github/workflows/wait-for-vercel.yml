name: Vercel Deployment Ready

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  wait-for-vercel:
    name: Wait for Vercel preview
    runs-on: ubuntu-latest
    permissions:
      deployments: read
      statuses: read
    steps:
      - name: Wait for Vercel deployment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "Waiting for Vercel deployment on SHA $SHA"
          max_wait=300
          elapsed=0
          while [ $elapsed -lt $max_wait ]; do
            deployment_id=$(curl -sf \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/deployments?sha=$SHA" \
              | jq -r 'map(select(.environment | test("Preview|preview"; "i"))) | .[0].id // empty')

            if [ -n "$deployment_id" ]; then
              state=$(curl -sf \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/deployments/$deployment_id/statuses" \
                | jq -r '.[0].state // "pending"')
              echo "Deployment $deployment_id state: $state"
              if [ "$state" = "success" ]; then
                echo "Vercel deployment is ready."
                exit 0
              elif [ "$state" = "failure" ] || [ "$state" = "error" ]; then
                echo "Vercel deployment failed: $state"
                exit 1
              fi
            else
              echo "No Vercel deployment found yet, waiting..."
            fi

            sleep 10
            elapsed=$((elapsed + 10))
          done
          echo "Timed out waiting for Vercel deployment after ${max_wait}s"
          exit 1
