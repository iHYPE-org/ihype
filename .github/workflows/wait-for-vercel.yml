name: Vercel Deployment Ready

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  wait-for-vercel:
    name: Wait for Vercel preview
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: prj_qxep3ZNTORhzTqZtwDnypvVyQxHO
          VERCEL_TEAM_ID: team_2Y6OYW9TSxuHI8un0ixjOGMB
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not configured — skipping Vercel preview check."
            exit 0
          fi
          echo "Waiting for Vercel deployment on SHA $SHA"
          max_wait=300
          elapsed=0
          while [ $elapsed -lt $max_wait ]; do
            response=$(curl -sf \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_TEAM_ID&limit=20" || true)

            state=$(echo "$response" \
              | jq -r --arg sha "$SHA" \
                '.deployments[]
                  | select(.meta.githubCommitSha == $sha and (.target != "production"))
                  | .state' \
              | head -1)

            if [ -n "$state" ]; then
              echo "Deployment state: $state"
              if [ "$state" = "READY" ]; then
                url=$(echo "$response" \
                  | jq -r --arg sha "$SHA" \
                    '.deployments[]
                      | select(.meta.githubCommitSha == $sha and (.target != "production"))
                      | .url' \
                  | head -1)
                echo "Vercel preview ready: https://$url"
                exit 0
              elif [ "$state" = "ERROR" ] || [ "$state" = "CANCELED" ]; then
                echo "Vercel deployment failed: $state"
                exit 1
              fi
            else
              echo "No Vercel deployment found yet for SHA $SHA, waiting..."
            fi

            sleep 10
            elapsed=$((elapsed + 10))
          done
          echo "No Vercel deployment appeared for SHA $SHA after ${max_wait}s — skipping (no active Vercel integration)."
          exit 0
