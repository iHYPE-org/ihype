name: Apply audit remediation

on:
  push:
    branches:
      - fix/audit-remediation-2026-07-09
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[audit-remediation-applied]') }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      AUTH_SECRET: audit-remediation-validation-secret-0123456789
      NEXTAUTH_SECRET: audit-remediation-validation-secret-0123456789
      AUTH_TRUST_HOST: 'true'
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      FEATURE_REQUIRE_INVITE_CODE: 'false'
      FEATURE_ENABLE_TICKET_PAYMENTS: 'false'
    steps:
      - uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          ref: fix/audit-remediation-2026-07-09

      - uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Apply deterministic source patches
        run: |
          python scripts/apply-audit-remediation.py
          python scripts/fix-remediation-typecheck.py

      - name: Install dependencies
        run: npm ci

      - name: Format and generate Prisma client
        run: |
          npx prisma format
          npx prisma generate

      - name: Typecheck
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee remediation-typecheck.log

      - name: Source policy lint
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee remediation-lint.log

      - name: Unit tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee remediation-tests.log

      - name: Upload remediation diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: audit-remediation-diagnostics
          path: remediation-*.log
          if-no-files-found: warn

      - name: Commit validated remediation
        run: |
          rm -f scripts/apply-audit-remediation.py scripts/fix-remediation-typecheck.py .github/workflows/apply-audit-remediation.yml remediation-*.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix repository audit findings [audit-remediation-applied]"
          git push origin HEAD:fix/audit-remediation-2026-07-09
