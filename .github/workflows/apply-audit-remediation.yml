name: Apply audit remediation

on:
  push:
    branches:
      - fix/audit-remediation-2026-07-09

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[audit-remediation-applied]') }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      AUTH_SECRET: audit-remediation-validation-secret-0123456789
      NEXTAUTH_SECRET: audit-remediation-validation-secret-0123456789
      AUTH_TRUST_HOST: 'true'
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      FEATURE_REQUIRE_INVITE_CODE: 'false'
      FEATURE_ENABLE_TICKET_PAYMENTS: 'false'
    steps:
      - uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          ref: fix/audit-remediation-2026-07-09

      - uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Apply deterministic source patches
        run: python scripts/apply-audit-remediation.py

      - name: Install dependencies
        run: npm ci

      - name: Format and generate Prisma client
        run: |
          npx prisma format
          npx prisma generate

      - name: Validate source
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Commit validated remediation
        run: |
          rm -f scripts/apply-audit-remediation.py .github/workflows/apply-audit-remediation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix repository audit findings [audit-remediation-applied]"
          git push origin HEAD:fix/audit-remediation-2026-07-09
