name: Auto-merge PRs

# SECURITY: pull_request_target runs with write permissions and repo secrets.
# This workflow is only safe because it NEVER checks out or executes PR code —
# it just flips the auto-merge bit via the GitHub API. Do not add an
# actions/checkout step (or anything that runs code from the PR head) here;
# that would let a malicious PR run with write access to this repository.
on:
  pull_request_target:
    types: [labeled, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --auto --squash
