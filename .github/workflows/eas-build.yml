name: EAS Build (iOS + Android)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'mobile/**'
  push:
    branches:
      - main
    paths:
      - 'mobile/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: EAS Build — ${{ github.event_name == 'push' && 'production' || 'preview' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: mobile-node-${{ hashFiles('mobile/package.json') }}
          restore-keys: mobile-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Typecheck
        run: npm run typecheck

      # PRs → internal preview build (ad-hoc signed, no store review)
      - name: EAS Build — preview (PR)
        if: github.event_name == 'pull_request'
        run: |
          eas build \
            --platform all \
            --profile preview \
            --non-interactive \
            --no-wait
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
          API_BASE_URL: https://ihype.org

      # Merges to main → production build (App Store / Google Play)
      - name: EAS Build — production (merge to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          eas build \
            --platform all \
            --profile production \
            --non-interactive \
            --no-wait
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
          API_BASE_URL: https://ihype.org

      - name: Build links
        if: always()
        run: |
          echo "### EAS Build triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Track progress at https://expo.dev/accounts/[your-account]/projects/ihype/builds" >> $GITHUB_STEP_SUMMARY
