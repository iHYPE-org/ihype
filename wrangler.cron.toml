name = "ihype-cron"
compatibility_date = "2025-01-01"
main = "workers/cron.ts"

[build]
command = ""

[vars]
APP_BASE_URL = "https://ihype.org"

# CRON_SECRET must be set as a secret:
#   wrangler secret put CRON_SECRET --config wrangler.cron.toml

[triggers]
crons = [
  "*/5 * * * *",  # show-lifecycle, expire-reservations
  "0 */6 * * *",  # health-check, db-health, stripe-connect-health
  "0 1 * * *",    # close-stale-bookings
  "0 2 * * *",    # expire-ads
  "0 3 * * *",    # session-cleanup
  "0 4 * * 1",    # audit-log-rotate (Monday)
  "0 6 * * *",    # feature-shows
  "0 8 * * *",    # digest
  "0 9 * * 1",    # weekly-picks, artist-digest, admin-report, follow-digest (Monday)
  "0 10 * * *",   # new-to-scene
  "0 11 * * *",   # artist-onboarding
  "0 12 * * *",   # show-reminders
  "0 13 * * *",   # show-payouts
  "0 14 * * *",   # onboarding
  "0 15 * * *",   # welcome-sequence
]
