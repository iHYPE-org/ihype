name = "ihype-cron"
compatibility_date = "2026-05-29"
main = "workers/cron.ts"

[build]
command = ""

[vars]
APP_BASE_URL = "https://ihype.org"

# CRON_SECRET must be set as a secret:
#   wrangler secret put CRON_SECRET --config wrangler.cron.toml

[triggers]
crons = [
  "*/5 * * * *",  # show-lifecycle, expire-reservations
  "0 */6 * * *",  # health-check, db-health, stripe-connect-health
  "0 1 * * *",    # close-stale-bookings
  "0 3 * * *",    # session-cleanup, push-cleanup, identity-detach (30-day IP scrub)
  "0 4 * * 1",    # audit-log-rotate (Monday)
  "0 6 * * *",    # feature-shows
  "0 8 * * *",    # digest
  "0 9 * * 1",    # weekly-picks, artist-digest, admin-report, follow-digest (Monday)
  "0 10 * * *",   # new-to-scene
  "0 11 * * *",   # artist-onboarding
  "0 12 * * *",   # show-reminders
  "0 13 * * *",   # show-payouts, ad-settlement
  "0 14 * * *",   # onboarding
  "0 15 * * *",   # welcome-sequence
  "0 5 * * *",    # backup-verify
  "0 7 * * *",    # daily-ops
  "0 * * * *",    # anomaly-check (every hour)
  "30 3 * * *",   # dmca-enforce
  "30 8 * * 1",   # social-digest (Monday)
  "*/15 * * * *", # publish-scheduled (every 15min)
  "0 16 * * *",   # post-show-recap (morning-after recap for attendees)
  # NOTE: nearby-show-notify runs at "0 9 * * *" (already covered by daily 9am slot)
  # NOTE: rsvp-reminders runs at "0 * * * *" (already covered by hourly slot)
  # NOTE: capacity-alerts runs at "0 * * * *" (already covered by hourly slot)
  # NOTE: weekly-digest runs at "0 9 * * 1" (already covered by Monday 9am slot)
  "0 9 1 * *",  # artist-earnings-summary (1st of month)
]
